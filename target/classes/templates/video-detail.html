<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${video.title})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container article-page">
      <div class="art-header">
        <span
          class="cat-tag"
          th:if="${video.category}"
          style="display: inline-block; margin-bottom: 10px"
          th:text="${video.category.name}"
          >Category</span
        >
        <h1 th:text="${video.title}">Title</h1>
        <div class="art-byline">
          <span th:if="${video.host}">
            Hosted by <strong th:text="${video.host}">Host</strong>
            &nbsp;&middot;&nbsp;
          </span>
          <span th:if="${video.duration}" th:text="${video.duration} + ' min'"
            >&nbsp;</span
          >
          <span th:if="${video.duration}">&nbsp;&middot;&nbsp;</span>
          <span th:text="${video.views} + ' views'">Views</span>
        </div>
      </div>

      <!-- Embedded video player -->
      <div
        style="
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          border-radius: 8px;
          margin: 20px 0 32px;
          background: #000;
        "
      >
        <iframe
          th:src="${video.embedUrl}"
          style="
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
          "
          allowfullscreen
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
        >
        </iframe>
      </div>

      <!-- Two-column layout -->
      <div class="article-layout">
        <div>
          <p
            th:if="${video.description}"
            style="
              font-size: 17px;
              line-height: 1.85;
              color: var(--dark);
              margin-bottom: 24px;
            "
            th:text="${video.description}"
          >
            Description
          </p>

          <!-- Share bar -->
          <div
            style="
              border-top: 1px solid var(--border);
              padding-top: 16px;
              display: flex;
              gap: 10px;
              align-items: center;
            "
          >
            <span style="font-size: 13px; font-weight: 700; color: var(--mid)">
              Share:
            </span>
            <a
              href="#"
              style="
                background: #1da1f2;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              Twitter
            </a>
            <a
              href="#"
              style="
                background: #0077b5;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              LinkedIn
            </a>
            <a
              href="#"
              style="
                background: #25d366;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              WhatsApp
            </a>
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="sidebar-widget">
            <h4>More Videos</h4>
            <div
              th:each="v : ${latestVideos}"
              th:if="${v.slug != video.slug}"
              style="display: flex; gap: 10px; margin-bottom: 12px"
            >
              <a
                th:href="@{/video/{slug}(slug=${v.slug})}"
                style="position: relative; flex-shrink: 0"
              >
                <img
                  th:src="${v.thumbnailUrl}
                 ?: 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=200'"
                  style="
                    width: 80px;
                    height: 54px;
                    object-fit: cover;
                    border-radius: 4px;
                  "
                />
                <div
                  style="
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    font-size: 12px;
                    color: #fff;
                  "
                >
                  &#9654;
                </div>
              </a>
              <h5
                style="
                  font-size: 12px;
                  font-family: var(--serif);
                  line-height: 1.35;
                  margin: 0;
                "
              >
                <a
                  th:href="@{/video/{slug}(slug=${v.slug})}"
                  th:text="${v.title}"
                  >Title</a
                >
              </h5>
            </div>
          </div>

          <div class="sidebar-widget">
            <h4>Topics</h4>
            <a
              th:each="cat : ${categories}"
              th:href="@{/category/{slug}(slug=${cat.slug})}"
              class="sidebar-cat-link"
              th:text="${cat.name}"
              >Category</a
            >
          </div>
        </aside>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
