<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Startups')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container page-section">
      <div class="section-header">
        <h2>Startup Listing</h2>
      </div>
      <p
        style="
          color: var(--muted);
          font-size: 15px;
          margin-top: -10px;
          margin-bottom: 24px;
        "
      >
        Discover India's most exciting early-stage companies.
      </p>

      <!-- Sector filter pills -->
      <div style="margin-bottom: 12px">
        <span
          style="
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 8px;
          "
          >Sector:</span
        >
        <a
          th:href="@{/startups}"
          th:style="${activeSector == null and activeStage == null}
                 ? 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none; margin-right:6px;'
                 : 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#fff; color:#555; border:1px solid var(--border); text-decoration:none; margin-right:6px;'"
        >
          All
        </a>
        <a
          th:each="sec : ${sectors}"
          th:href="@{/startups(sector=${sec})}"
          th:text="${sec}"
          th:style="${activeSector == sec}
                 ? 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none; margin-right:6px;'
                 : 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#fff; color:#555; border:1px solid var(--border); text-decoration:none; margin-right:6px;'"
        >
          Sector
        </a>
      </div>

      <!-- Funding stage filter pills -->
      <div style="margin-bottom: 28px">
        <span
          style="
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 8px;
          "
          >Stage:</span
        >
        <a
          th:each="stage : ${fundingStages}"
          th:href="@{/startups(stage=${stage})}"
          th:text="${stage.label}"
          th:style="${activeStage == stage}
                 ? 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#cc0000; color:#fff; border:1px solid #cc0000; text-decoration:none; margin-right:6px;'
                 : 'padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; background:#fff; color:#555; border:1px solid var(--border); text-decoration:none; margin-right:6px;'"
        >
          Stage
        </a>
      </div>

      <!-- Startup cards -->
      <div class="blog-grid" th:if="${!startups.content.isEmpty()}">
        <div
          th:each="st : ${startups.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--white);
            transition: box-shadow 0.2s;
          "
          onmouseover="this.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <!-- Header strip -->
          <div style="height: 80px; background: #111; position: relative">
            <img
              th:if="${st.coverImageUrl}"
              th:src="${st.coverImageUrl}"
              style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5"
            />
            <div style="position: absolute; bottom: -18px; left: 14px">
              <img
                th:if="${st.logoUrl}"
                th:src="${st.logoUrl}"
                style="
                  width: 36px;
                  height: 36px;
                  object-fit: contain;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  padding: 3px;
                "
              />
              <div
                th:unless="${st.logoUrl}"
                style="
                  width: 36px;
                  height: 36px;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 14px;
                "
              >
                &#128640;
              </div>
            </div>
            <!-- Funding stage badge -->
            <div
              th:if="${st.fundingStage != null}"
              style="
                position: absolute;
                top: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                font-size: 10px;
                font-weight: 700;
                padding: 3px 8px;
                border-radius: 10px;
              "
              th:text="${st.fundingStage.label}"
            >
              Stage
            </div>
          </div>

          <div style="padding: 26px 14px 16px">
            <!-- Sector -->
            <div
              th:if="${st.sector}"
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 4px;
              "
              th:text="${st.sector}"
            >
              Sector
            </div>

            <!-- Name -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
              "
            >
              <a
                th:href="@{/startup/{slug}(slug=${st.slug})}"
                th:text="${st.name}"
                >Name</a
              >
            </h3>

            <!-- Pitch -->
            <p
              th:if="${st.pitch}"
              style="
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 12px;
                line-height: 1.5;
              "
              th:text="${#strings.abbreviate(st.pitch, 100)}"
            >
              Pitch
            </p>

            <!-- Quick stats -->
            <div
              style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 12px;
              "
            >
              <span th:if="${st.city}" th:text="'&#128205; ' + ${st.city}"
                >City</span
              >
              <span
                th:if="${st.foundingYear}"
                th:text="'Est. ' + ${st.foundingYear}"
                >Year</span
              >
              <span
                th:if="${st.amountRaised}"
                style="font-weight: 700; color: var(--black)"
                th:text="${st.amountRaised}"
                >Amount</span
              >
            </div>

            <a
              th:href="@{/startup/{slug}(slug=${st.slug})}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
            >
              View Profile &rarr;
            </a>
          </div>
        </div>
      </div>

      <p
        th:if="${startups.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No startups found.
      </p>

      <!-- Pagination -->
      <div class="pagination" th:if="${startups.totalPages > 1}">
        <a
          th:if="${currentPage > 0 and activeSector != null}"
          th:href="@{/startups(sector=${activeSector}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <a
          th:if="${currentPage > 0 and activeStage != null}"
          th:href="@{/startups(stage=${activeStage}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <a
          th:if="${currentPage > 0 and activeSector == null and activeStage == null}"
          th:href="@{/startups(page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${startups.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < startups.totalPages and activeSector != null}"
          th:href="@{/startups(sector=${activeSector}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
        <a
          th:if="${currentPage + 1 < startups.totalPages and activeStage != null}"
          th:href="@{/startups(stage=${activeStage}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
        <a
          th:if="${currentPage + 1 < startups.totalPages and activeSector == null and activeStage == null}"
          th:href="@{/startups(page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
