<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Contact')}"></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<div class="container">
  <div class="page-content">
    <h1>Contact Us</h1>
    <p>Story tips, partnership inquiries, or feedback — we'd love to hear from you.</p>

    <div th:if="${contactSuccess}" class="alert alert-success" th:text="${contactSuccess}">OK</div>

    <form method="post" th:action="@{/contact}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Jane Smith" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="jane@example.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject" placeholder="What's it about?"/>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" rows="6" placeholder="Your message..." required></textarea>
      </div>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
