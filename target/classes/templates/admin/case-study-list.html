<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Case Studies')}"></head>
  <body>
    <div class="admin-layout">
      <div
        th:replace="~{admin/admin-fragments :: sidebar('case-studies')}"
      ></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Case Studies</h1>
          <a th:href="@{/admin/case-studies/new}" class="btn btn-primary">
            + New Case Study
          </a>
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Client</th>
                <th>Industry</th>
                <th>Result</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="cs : ${caseStudies}">
                <td><strong th:text="${cs.title}">Title</strong></td>
                <td th:text="${cs.clientName} ?: '—'">Client</td>
                <td th:text="${cs.clientIndustry} ?: '—'">Industry</td>
                <td th:text="${cs.caseResult} ?: '—'">Result</td>
                <td>
                  <span class="badge published" th:if="${cs.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${cs.published}">
                    Draft
                  </span>
                </td>
                <td th:text="${cs.views}">0</td>
                <td th:text="${#temporals.format(cs.createdAt,'MMM dd')}">
                  Date
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/article/{slug}(slug=${cs.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/case-studies/edit/{id}(id=${cs.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/case-studies/delete/{id}(id=${cs.id})}"
                    onsubmit="return confirm('Delete this case study?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${caseStudies.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No case studies yet.
            <a th:href="@{/admin/case-studies/new}" style="color: #c0392b">
              Add the first one.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
