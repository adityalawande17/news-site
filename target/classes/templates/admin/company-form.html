<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Company' : 'New Company')}"
  ></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('companies')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1 th:text="${isEdit} ? 'Edit Company' : 'New Company'">Company</h1>
          <a th:href="@{/admin/companies}" class="btn btn-secondary">
            &larr; Back to Companies
          </a>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">
          Error
        </div>

        <div class="admin-card">
          <form
            method="post"
            th:action="@{/admin/companies/save}"
            enctype="multipart/form-data"
            th:object="${company}"
          >
            <input type="hidden" th:field="*{id}" />

            <div class="form-row">
              <div class="form-group">
                <label
                  >Company Name <span style="color: #c0392b">*</span></label
                >
                <input
                  type="text"
                  th:field="*{name}"
                  placeholder="e.g. TechCorp India"
                  required
                />
              </div>
              <div class="form-group">
                <label
                  >URL Slug
                  <span style="color: #999; font-weight: 400">
                    (auto-generated if empty)
                  </span>
                </label>
                <input
                  type="text"
                  th:field="*{slug}"
                  placeholder="techcorp-india"
                />
              </div>
            </div>

            <div class="form-group">
              <label>Tagline</label>
              <input
                type="text"
                th:field="*{tagline}"
                placeholder="e.g. Powering India's Digital Future"
              />
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea
                th:field="*{description}"
                rows="4"
                placeholder="Full company description..."
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Sector</label>
                <input
                  type="text"
                  th:field="*{sector}"
                  placeholder="e.g. SaaS, Fintech, Healthcare"
                />
              </div>
              <div class="form-group">
                <label>Headquarters</label>
                <input
                  type="text"
                  th:field="*{headquarters}"
                  placeholder="e.g. Bengaluru, India"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Founding Year</label>
                <input
                  type="number"
                  th:field="*{foundingYear}"
                  placeholder="e.g. 2018"
                  min="1800"
                  max="2099"
                />
              </div>
              <div class="form-group">
                <label>Employee Count</label>
                <input
                  type="text"
                  th:field="*{employeeCount}"
                  placeholder="e.g. 1,200 or 500-1000"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Annual Revenue</label>
                <input
                  type="text"
                  th:field="*{annualRevenue}"
                  placeholder="e.g. Rs. 450 Cr or $50M"
                />
              </div>
              <div class="form-group">
                <label>CEO Name</label>
                <input
                  type="text"
                  th:field="*{ceoName}"
                  placeholder="e.g. Rahul Sharma"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Website URL</label>
                <input
                  type="text"
                  th:field="*{websiteUrl}"
                  placeholder="https://techcorp.in"
                />
              </div>
              <div class="form-group">
                <label>LinkedIn URL</label>
                <input
                  type="text"
                  th:field="*{linkedinUrl}"
                  placeholder="https://linkedin.com/company/techcorp"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Logo</label>
                <img
                  th:if="${company.logoUrl}"
                  th:src="${company.logoUrl}"
                  style="
                    width: 60px;
                    height: 60px;
                    object-fit: contain;
                    border: 1px solid #eee;
                    border-radius: 4px;
                    padding: 4px;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="logoFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                  Recommended: Square PNG with transparent background.
                </p>
              </div>
              <div class="form-group">
                <label>Cover Image</label>
                <img
                  th:if="${company.coverImageUrl}"
                  th:src="${company.coverImageUrl}"
                  style="
                    width: 120px;
                    border-radius: 4px;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="coverFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                  Shown as banner on the company profile page.
                </p>
              </div>
            </div>

            <div class="checkbox-row" style="margin-bottom: 24px">
              <label>
                <input type="checkbox" th:field="*{published}" />
                Published (visible on site)
              </label>
              <label>
                <input type="checkbox" th:field="*{featured}" />
                Featured (shown on homepage)
              </label>
            </div>

            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button
              type="submit"
              class="btn btn-primary"
              th:text="${isEdit} ? 'Update Company' : 'Add Company'"
            >
              Save
            </button>
            <a
              th:href="@{/admin/companies}"
              class="btn btn-secondary"
              style="margin-left: 8px"
              >Cancel</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
