<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/admin-fragments :: head('Categories')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-fragments :: sidebar('categories')}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1>Categories</h1>
            <a th:href="@{/admin/categories/new}" class="btn btn-primary">+ New Category</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}">OK</div>

        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Slug</th>
                        <th>Description</th>
                        <th>Articles</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat, iter : ${categories}">
                        <td th:text="${iter.count}">1</td>
                        <td><strong th:text="${cat.name}">Name</strong></td>
                        <td><code th:text="${cat.slug}">slug</code></td>
                        <td th:text="${cat.description} ?: '—'">Desc</td>
                        <td th:text="${cat.articles.size()}">0</td>
                        <td style="display:flex; gap:6px;">
                            <a th:href="@{/category/{slug}(slug=${cat.slug})}" class="btn btn-secondary btn-sm" target="_blank">View</a>
                            <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-secondary btn-sm">Edit</a>
                            <form method="post" th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                  onsubmit="return confirm('Delete this category? Articles will lose their category.')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger btn-sm">Del</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${categories.isEmpty()}" style="text-align:center; color:#888; padding:30px 0;">
                No categories yet. <a th:href="@{/admin/categories/new}" style="color:#c0392b;">Add one.</a>
            </p>
        </div>
    </main>
</div>
</body>
</html>
