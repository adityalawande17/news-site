<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Dashboard')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('dashboard')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Dashboard</h1>
          <a th:href="@{/admin/articles/new}" class="btn btn-primary"
            >+ New Article</a
          >
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="num" th:text="${totalArticles}">0</div>
            <div class="label">Total Articles</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${publishedArticles}">0</div>
            <div class="label">Published</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalInterviews}">0</div>
            <div class="label">Interviews</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalNews}">0</div>
            <div class="label">News Articles</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalCaseStudies}">0</div>
            <div class="label">Case Studies</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalPressReleases}">0</div>
            <div class="label">Press Releases</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalVideos}">0</div>
            <div class="label">Videos</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalMagazines}">0</div>
            <div class="label">Issues</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalCompanies}">0</div>
            <div class="label">Companies</div>
          </div>
          <div class="stat-card">
            <div class="num" th:text="${totalCategories}">0</div>
            <div class="label">Categories</div>
          </div>
        </div>

        <div class="admin-card">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 16px;
            "
          >
            <h3 style="margin: 0">Recent Content</h3>
            <a
              th:href="@{/admin/articles}"
              style="font-size: 13px; color: #c0392b"
              >View All</a
            >
          </div>
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Type</th>
                <th>Category</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="art : ${recentArticles}">
                <td th:text="${art.title}">Title</td>
                <td>
                  <span
                    style="font-size: 11px; font-weight: 600; color: #555"
                    th:text="${art.articleType}"
                    >Type</span
                  >
                </td>
                <td th:text="${art.category?.name} ?: '—'">Cat</td>
                <td>
                  <span class="badge published" th:if="${art.published}"
                    >Published</span
                  >
                  <span class="badge draft" th:unless="${art.published}"
                    >Draft</span
                  >
                </td>
                <td th:text="${art.views}">0</td>
                <td th:text="${#temporals.format(art.createdAt,'MMM dd')}">
                  Date
                </td>
                <td>
                  <a
                    th:href="@{/admin/articles/edit/{id}(id=${art.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
