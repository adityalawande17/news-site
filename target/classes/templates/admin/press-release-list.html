<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Press Releases')}"></head>
  <body>
    <div class="admin-layout">
      <div
        th:replace="~{admin/admin-fragments :: sidebar('press-releases')}"
      ></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Press Releases</h1>
          <a th:href="@{/admin/press-releases/new}" class="btn btn-primary">
            + New Press Release
          </a>
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Company</th>
                <th>Contact</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="pr : ${pressReleases}">
                <td><strong th:text="${pr.title}">Title</strong></td>
                <td th:text="${pr.pressCompanyName} ?: '—'">Company</td>
                <td th:text="${pr.pressContactEmail} ?: '—'">Contact</td>
                <td>
                  <span class="badge published" th:if="${pr.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${pr.published}">
                    Draft
                  </span>
                </td>
                <td th:text="${pr.views}">0</td>
                <td th:text="${#temporals.format(pr.createdAt,'MMM dd')}">
                  Date
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/article/{slug}(slug=${pr.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/press-releases/edit/{id}(id=${pr.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/press-releases/delete/{id}(id=${pr.id})}"
                    onsubmit="return confirm('Delete this press release?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${pressReleases.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No press releases yet.
            <a th:href="@{/admin/press-releases/new}" style="color: #c0392b">
              Add the first one.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
