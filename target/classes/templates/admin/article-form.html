<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Article' : 'New Article')}"
  ></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('articles')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1 th:text="${isEdit} ? 'Edit Article' : 'New Article'">Article</h1>
          <a th:href="@{/admin/articles}" class="btn btn-secondary"
            >&larr; Back to Articles</a
          >
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">
          Error
        </div>

        <div class="admin-card">
          <form
            method="post"
            th:action="@{/admin/articles/save}"
            enctype="multipart/form-data"
            th:object="${article}"
          >
            <input type="hidden" th:field="*{id}" />

            <!-- Article Type -->
            <div class="form-group">
              <label>Article Type <span style="color: #c0392b">*</span></label>
              <select th:field="*{articleType}" id="articleTypeSelect">
                <option
                  th:each="type : ${articleTypes}"
                  th:value="${type}"
                  th:text="${type}"
                >
                  Type
                </option>
              </select>
            </div>

            <!-- Title -->
            <div class="form-group">
              <label>Title <span style="color: #c0392b">*</span></label>
              <input
                type="text"
                th:field="*{title}"
                placeholder="Article headline..."
                required
              />
              <span
                style="color: #c0392b; font-size: 12.5px"
                th:if="${#fields.hasErrors('title')}"
                th:errors="*{title}"
                >Error</span
              >
            </div>

            <div class="form-row">
              <!-- Slug -->
              <div class="form-group">
                <label
                  >URL Slug
                  <span style="color: #999; font-weight: 400"
                    >(auto-generated if empty)</span
                  >
                </label>
                <input
                  type="text"
                  th:field="*{slug}"
                  placeholder="my-article-url"
                />
              </div>
              <!-- Category -->
              <div class="form-group">
                <label>Category</label>
                <select name="categoryId">
                  <option value="">— None —</option>
                  <option
                    th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${article.category != null and article.category.id == cat.id}"
                  >
                    Cat
                  </option>
                </select>
              </div>
            </div>

            <!-- Author -->
            <div class="form-group">
              <label>Author Name</label>
              <input
                type="text"
                th:field="*{authorName}"
                placeholder="e.g. Editorial Team"
              />
            </div>

            <!-- Summary -->
            <div class="form-group">
              <label
                >Summary <span style="color: #c0392b">*</span>
                <span style="color: #999; font-weight: 400"
                  >— shown in card previews, max 500 chars</span
                >
              </label>
              <textarea
                th:field="*{summary}"
                rows="3"
                maxlength="500"
                placeholder="A short compelling summary..."
                required
              ></textarea>
              <span
                style="color: #c0392b; font-size: 12.5px"
                th:if="${#fields.hasErrors('summary')}"
                th:errors="*{summary}"
                >Error</span
              >
            </div>

            <!-- Body Content -->
            <div class="form-group">
              <label>Body Content</label>
              <textarea
                th:field="*{content}"
                rows="14"
                placeholder="Full article body... (Q&amp;A format for interviews)"
              ></textarea>
            </div>

            <!-- Cover Image -->
            <div class="form-group">
              <label>Cover Image</label>
              <img
                th:if="${article.imageUrl}"
                th:src="${article.imageUrl}"
                class="current-image"
                alt="Current cover"
              />
              <input type="file" name="imageFile" accept="image/*" />
              <p style="font-size: 12.5px; color: #888; margin: 5px 0 0">
                Max 5 MB. Leave blank to keep existing image.
              </p>
            </div>

            <!-- ══ INTERVIEW FIELDS — shown only when type = INTERVIEW ══ -->
            <div
              id="interviewFields"
              style="
                display: none;
                border: 1px solid #e0d0d0;
                background: #fff8f8;
                border-radius: 6px;
                padding: 20px;
                margin-bottom: 18px;
              "
            >
              <h4
                style="
                  margin: 0 0 16px;
                  font-size: 15px;
                  color: #c0392b;
                  border-bottom: 1px solid #f0d0d0;
                  padding-bottom: 10px;
                "
              >
                &#127908; Interview Details
              </h4>

              <div class="form-row">
                <div class="form-group">
                  <label>Interviewee Name</label>
                  <input
                    type="text"
                    th:field="*{intervieweeName}"
                    placeholder="e.g. Rahul Sharma"
                  />
                </div>
                <div class="form-group">
                  <label>Title / Designation</label>
                  <input
                    type="text"
                    th:field="*{intervieweeTitle}"
                    placeholder="e.g. Founder &amp; CEO"
                  />
                </div>
              </div>

              <div class="form-group">
                <label>Company / Organisation</label>
                <input
                  type="text"
                  th:field="*{intervieweeCompany}"
                  placeholder="e.g. TechVentures India"
                />
              </div>

              <div class="form-group">
                <label>Interviewee Photo</label>
                <div
                  th:if="${article.intervieweePhoto}"
                  style="margin-bottom: 10px"
                >
                  <img
                    th:src="${article.intervieweePhoto}"
                    style="
                      width: 80px;
                      height: 80px;
                      border-radius: 50%;
                      object-fit: cover;
                      border: 2px solid #e0e0e0;
                    "
                  />
                  <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                    Current photo
                  </p>
                </div>
                <input
                  type="file"
                  name="intervieweePhotoFile"
                  accept="image/*"
                />
                <p style="font-size: 12.5px; color: #888; margin: 5px 0 0">
                  Recommended: Square image, min 300x300px. Displays as a
                  circle.
                </p>
              </div>
            </div>
            <!-- ══ END INTERVIEW FIELDS ══ -->

            <!-- ══ NEWS FIELDS ══ -->
            <div
              id="newsFields"
              style="
                display: none;
                border: 1px solid #d0dde0;
                background: #f5fafc;
                border-radius: 6px;
                padding: 20px;
                margin-bottom: 18px;
              "
            >
              <h4
                style="
                  margin: 0 0 16px;
                  font-size: 15px;
                  color: #1a6a8a;
                  border-bottom: 1px solid #d0e8f0;
                  padding-bottom: 10px;
                "
              >
                &#128240; News Details
              </h4>
              <div class="form-row">
                <div class="form-group">
                  <label>News Source</label>
                  <input
                    type="text"
                    th:field="*{newsSource}"
                    placeholder="e.g. Reuters, Bloomberg, ET"
                  />
                </div>
                <div
                  class="form-group"
                  style="display: flex; align-items: center; padding-top: 28px"
                >
                  <label
                    style="
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      th:field="*{breaking}"
                      style="width: auto"
                    />
                    <span
                      >Mark as <strong>Breaking News</strong>
                      <span style="font-size: 11px; color: #888">
                        (shows red badge on the article)
                      </span>
                    </span>
                  </label>
                </div>
              </div>
            </div>
            <!-- ══ END NEWS FIELDS ══ -->

            <!-- CASE STUDY FIELDS -->
            <div
              id="caseStudyFields"
              style="
                display: none;
                border: 1px solid #d0e0d0;
                background: #f5fdf5;
                border-radius: 6px;
                padding: 20px;
                margin-bottom: 18px;
              "
            >
              <h4
                style="
                  margin: 0 0 16px;
                  font-size: 15px;
                  color: #1a7a3a;
                  border-bottom: 1px solid #c0e0c0;
                  padding-bottom: 10px;
                "
              >
                &#128202; Case Study Details
              </h4>

              <div class="form-row">
                <div class="form-group">
                  <label>Client Name</label>
                  <input
                    type="text"
                    th:field="*{clientName}"
                    placeholder="e.g. Tata Motors"
                  />
                </div>
                <div class="form-group">
                  <label>Client Industry</label>
                  <input
                    type="text"
                    th:field="*{clientIndustry}"
                    placeholder="e.g. Automotive"
                  />
                </div>
              </div>

              <div class="form-group">
                <label
                  >Result / Outcome
                  <span style="color: #999; font-weight: 400">
                    — shown as the headline stat on the card
                  </span>
                </label>
                <input
                  type="text"
                  th:field="*{caseResult}"
                  placeholder="e.g. 40% revenue growth in 6 months"
                />
              </div>

              <div class="form-group">
                <label>The Challenge</label>
                <textarea
                  th:field="*{caseChallenge}"
                  rows="3"
                  placeholder="What problem did the client face?"
                ></textarea>
              </div>

              <div class="form-group">
                <label>The Solution</label>
                <textarea
                  th:field="*{caseSolution}"
                  rows="3"
                  placeholder="What was done to solve it?"
                ></textarea>
              </div>
            </div>
            <!-- END CASE STUDY FIELDS -->

            <!-- PRESS RELEASE FIELDS -->
            <div
              id="pressReleaseFields"
              style="
                display: none;
                border: 1px solid #d8d0e8;
                background: #faf8ff;
                border-radius: 6px;
                padding: 20px;
                margin-bottom: 18px;
              "
            >
              <h4
                style="
                  margin: 0 0 16px;
                  font-size: 15px;
                  color: #5a3a8a;
                  border-bottom: 1px solid #e0d8f0;
                  padding-bottom: 10px;
                "
              >
                &#128228; Press Release Details
              </h4>

              <div class="form-group">
                <label>Company Name</label>
                <input
                  type="text"
                  th:field="*{pressCompanyName}"
                  placeholder="e.g. TechCorp India"
                />
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Media Contact Name</label>
                  <input
                    type="text"
                    th:field="*{pressContactName}"
                    placeholder="e.g. Priya Sharma"
                  />
                </div>
                <div class="form-group">
                  <label>Media Contact Email</label>
                  <input
                    type="email"
                    th:field="*{pressContactEmail}"
                    placeholder="e.g. pr@techcorp.in"
                  />
                </div>
              </div>
            </div>
            <!-- END PRESS RELEASE FIELDS -->

            <!-- Flags -->
            <div class="checkbox-row" style="margin-bottom: 24px">
              <label>
                <input type="checkbox" th:field="*{published}" />
                Published (visible on site)
              </label>
              <label>
                <input type="checkbox" th:field="*{featured}" />
                Featured (shown in homepage hero)
              </label>
            </div>

            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button
              type="submit"
              class="btn btn-primary"
              th:text="${isEdit} ? 'Update' : 'Publish'"
            >
              Save
            </button>
            <a
              th:href="@{/admin/articles}"
              class="btn btn-secondary"
              style="margin-left: 8px"
              >Cancel</a
            >
          </form>
        </div>
      </main>
    </div>
    <script>
      const typeSelect = document.getElementById("articleTypeSelect");
      const ivFields = document.getElementById("interviewFields");
      const newsFields = document.getElementById("newsFields");
      const csFields = document.getElementById("caseStudyFields");
      const prFields = document.getElementById("pressReleaseFields");

      function toggleTypeFields() {
        const type = typeSelect.value;
        ivFields.style.display = type === "INTERVIEW" ? "block" : "none";
        newsFields.style.display =
          type === "NEWS" || type === "INDUSTRY_NEWS" || type === "MARKET_NEWS"
            ? "block"
            : "none";
        csFields.style.display = type === "CASE_STUDY" ? "block" : "none";
        prFields.style.display = type === "PRESS_RELEASE" ? "block" : "none";
      }

      toggleTypeFields();
      typeSelect.addEventListener("change", toggleTypeFields);
    </script>
  </body>
</html>
