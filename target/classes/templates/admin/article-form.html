<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Article' : 'New Article')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-fragments :: sidebar('articles')}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1 th:text="${isEdit} ? 'Edit Article' : 'New Article'">Article</h1>
            <a th:href="@{/admin/articles}" class="btn btn-secondary">&larr; Back to Articles</a>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">Error</div>

        <div class="admin-card">
            <form method="post" th:action="@{/admin/articles/save}" enctype="multipart/form-data" th:object="${article}">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label>Title <span style="color:#c0392b">*</span></label>
                    <input type="text" th:field="*{title}" placeholder="Article headline..." required/>
                    <span style="color:#c0392b; font-size:12.5px;" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>URL Slug <span style="color:#999; font-weight:400;">(auto-generated if empty)</span></label>
                        <input type="text" th:field="*{slug}" placeholder="my-article-url"/>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="categoryId">
                            <option value="">— None —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${article.category != null and article.category.id == cat.id}">Cat</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Author Name</label>
                    <input type="text" th:field="*{authorName}" placeholder="e.g. Editorial Team"/>
                </div>

                <div class="form-group">
                    <label>Summary <span style="color:#c0392b">*</span> <span style="color:#999; font-weight:400;">(shown in card previews, max 500 chars)</span></label>
                    <textarea th:field="*{summary}" rows="2" maxlength="500" placeholder="A short, compelling summary..." required></textarea>
                    <span style="color:#c0392b; font-size:12.5px;" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}">Error</span>
                </div>

                <div class="form-group">
                    <label>Body Content</label>
                    <textarea th:field="*{content}" rows="14" placeholder="Full article body..."></textarea>
                </div>

                <div class="form-group">
                    <label>Cover Image</label>
                    <img th:if="${article.imageUrl}" th:src="${article.imageUrl}" class="current-image" alt="Current image"/>
                    <input type="file" name="imageFile" accept="image/*"/>
                    <p style="font-size:12.5px; color:#888; margin:5px 0 0;">Max 5 MB. Leave blank to keep existing image.</p>
                </div>

                <div class="checkbox-row" style="margin-bottom: 24px;">
                    <label>
                        <input type="checkbox" th:field="*{published}"/>
                        Published (visible on site)
                    </label>
                    <label>
                        <input type="checkbox" th:field="*{featured}"/>
                        Featured (shown in homepage hero)
                    </label>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Article' : 'Publish Article'">Save</button>
                <a th:href="@{/admin/articles}" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
            </form>
        </div>
    </main>
</div>
</body>
</html>
