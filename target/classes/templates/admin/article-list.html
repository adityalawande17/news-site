<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/admin-fragments :: head('Articles')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-fragments :: sidebar('articles')}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1>Articles</h1>
            <a th:href="@{/admin/articles/new}" class="btn btn-primary">+ New Article</a>
        </div>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">Success</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}">OK</div>

        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Category</th>
                        <th>Featured</th>
                        <th>Status</th>
                        <th>Views</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="art : ${articles}">
                        <td>
                            <strong th:text="${art.title}">Title</strong>
                        </td>
                        <td th:text="${art.authorName} ?: '—'">Author</td>
                        <td th:text="${art.category?.name} ?: '—'">Cat</td>
                        <td th:text="${art.featured} ? 'Yes' : 'No'">No</td>
                        <td>
                            <span class="badge published" th:if="${art.published}">Published</span>
                            <span class="badge draft" th:unless="${art.published}">Draft</span>
                        </td>
                        <td th:text="${art.views}">0</td>
                        <td th:text="${#temporals.format(art.createdAt, 'MMM dd')}">Date</td>
                        <td style="display:flex; gap:6px;">
                            <a th:href="@{/article/{slug}(slug=${art.slug})}" class="btn btn-secondary btn-sm" target="_blank">View</a>
                            <a th:href="@{/admin/articles/edit/{id}(id=${art.id})}" class="btn btn-secondary btn-sm">Edit</a>
                            <form method="post" th:action="@{/admin/articles/delete/{id}(id=${art.id})}"
                                  onsubmit="return confirm('Delete this article?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger btn-sm">Del</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${articles.isEmpty()}" style="text-align:center; color:#888; padding: 30px 0;">
                No articles yet. <a th:href="@{/admin/articles/new}" style="color:#c0392b;">Create one now.</a>
            </p>
        </div>
    </main>
</div>
</body>
</html>
