<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login | BizPulse</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <h2>BizPulse Admin</h2>
        <p style="color:#777; font-size:14px; margin-top:-10px;">Sign in to manage your content.</p>

        <div class="alert alert-error" th:if="${param.error}">
            Invalid username or password. Please try again.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out.
        </div>

        <form method="post" th:action="@{/admin/login}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autofocus required placeholder="admin"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••"/>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="login-hint">Default credentials: <strong>admin / admin123</strong><br/>Change this in production.</p>
    </div>
</div>
</body>
</html>
