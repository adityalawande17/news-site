<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Magazine')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('magazine')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Magazine Issues</h1>
          <a th:href="@{/admin/magazine/new}" class="btn btn-primary">
            + New Issue
          </a>
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Cover</th>
                <th>Issue</th>
                <th>Title</th>
                <th>Region</th>
                <th>Month / Year</th>
                <th>PDF</th>
                <th>Articles</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="mag : ${magazines}">
                <td>
                  <img
                    th:if="${mag.coverImageUrl}"
                    th:src="${mag.coverImageUrl}"
                    style="
                      width: 50px;
                      height: 68px;
                      object-fit: cover;
                      border-radius: 3px;
                    "
                  />
                  <div
                    th:unless="${mag.coverImageUrl}"
                    style="
                      width: 50px;
                      height: 68px;
                      background: #eee;
                      border-radius: 3px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 18px;
                    "
                  >
                    &#128218;
                  </div>
                </td>
                <td>
                  <strong th:text="'#' + ${mag.issueNumber}">Issue</strong>
                </td>
                <td th:text="${mag.title}">Title</td>
                <td th:text="${mag.region != null} ? ${mag.region.label} : '—'">
                  Region
                </td>
                <td th:text="${mag.month} + ' ' + ${mag.year}">Month Year</td>
                <td>
                  <a
                    th:if="${mag.pdfUrl}"
                    th:href="${mag.pdfUrl}"
                    target="_blank"
                    style="color: #c0392b; font-size: 12px; font-weight: 700"
                  >
                    Download
                  </a>
                  <span
                    th:unless="${mag.pdfUrl}"
                    style="color: #aaa; font-size: 12px"
                    >None</span
                  >
                </td>
                <td th:text="${mag.featuredArticles.size()}">0</td>
                <td>
                  <span class="badge published" th:if="${mag.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${mag.published}">
                    Draft
                  </span>
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/magazine/{slug}(slug=${mag.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/magazine/edit/{id}(id=${mag.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/magazine/delete/{id}(id=${mag.id})}"
                    onsubmit="return confirm('Delete this issue?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${magazines.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No issues yet.
            <a th:href="@{/admin/magazine/new}" style="color: #c0392b">
              Create the first issue.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
