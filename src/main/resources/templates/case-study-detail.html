<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${article.title})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container article-page">
      <div class="art-header">
        <span
          class="cat-tag"
          style="display: inline-block; margin-bottom: 10px"
        >
          Case Study
        </span>
        <h1 th:text="${article.title}">Title</h1>

        <!-- Client info bar -->
        <div
          th:if="${article.clientName != null}"
          style="
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f5f5f5;
            border-left: 4px solid var(--black);
            padding: 14px 18px;
            margin: 16px 0;
          "
        >
          <div>
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted);
                margin-bottom: 3px;
              "
            >
              Client
            </div>
            <div
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
                color: var(--black);
              "
              th:text="${article.clientName}"
            >
              Client
            </div>
          </div>
          <div
            th:if="${article.clientIndustry}"
            style="border-left: 1px solid var(--border); padding-left: 20px"
          >
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted);
                margin-bottom: 3px;
              "
            >
              Industry
            </div>
            <div
              style="font-size: 16px; font-weight: 600; color: var(--dark)"
              th:text="${article.clientIndustry}"
            >
              Industry
            </div>
          </div>
        </div>

        <div class="art-byline">
          By
          <strong th:text="${article.authorName} ?: 'Editorial Team'"
            >Author</strong
          >
          &nbsp;&middot;&nbsp;
          <span
            th:text="${#temporals.format(article.createdAt,'MMMM dd, yyyy')}"
          >
            Date
          </span>
          &nbsp;&middot;&nbsp;
          <span th:text="${article.views} + ' views'">Views</span>
        </div>
      </div>

      <!-- Cover image -->
      <img
        class="art-cover"
        th:if="${article.imageUrl}"
        th:src="${article.imageUrl}"
        th:alt="${article.title}"
      />

      <!-- Challenge / Solution / Result stats block -->
      <div
        th:if="${article.caseResult != null or article.caseChallenge != null}"
        style="
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          border: 1px solid var(--border);
          border-radius: 6px;
          overflow: hidden;
          margin-bottom: 32px;
        "
      >
        <div style="padding: 20px; border-right: 1px solid var(--border)">
          <div
            style="
              font-size: 11px;
              font-weight: 700;
              text-transform: uppercase;
              letter-spacing: 0.6px;
              color: var(--muted);
              margin-bottom: 8px;
            "
          >
            The Challenge
          </div>
          <div
            style="font-size: 14px; line-height: 1.6; color: var(--dark)"
            th:text="${article.caseChallenge} ?: '—'"
          >
            Challenge
          </div>
        </div>

        <div style="padding: 20px; border-right: 1px solid var(--border)">
          <div
            style="
              font-size: 11px;
              font-weight: 700;
              text-transform: uppercase;
              letter-spacing: 0.6px;
              color: var(--muted);
              margin-bottom: 8px;
            "
          >
            The Solution
          </div>
          <div
            style="font-size: 14px; line-height: 1.6; color: var(--dark)"
            th:text="${article.caseSolution} ?: '—'"
          >
            Solution
          </div>
        </div>

        <div style="padding: 20px; background: #111">
          <div
            style="
              font-size: 11px;
              font-weight: 700;
              text-transform: uppercase;
              letter-spacing: 0.6px;
              color: #888;
              margin-bottom: 8px;
            "
          >
            The Result
          </div>
          <div
            style="
              font-family: var(--serif);
              font-size: 22px;
              font-weight: 700;
              color: #fff;
              line-height: 1.3;
            "
            th:text="${article.caseResult} ?: '—'"
          >
            Result
          </div>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="article-layout">
        <div>
          <div class="article-body">
            <p class="summary-quote" th:text="${article.summary}">Summary</p>
            <div th:utext="${article.content}">Content</div>
          </div>

          <!-- Share bar -->
          <div
            style="
              border-top: 1px solid var(--border);
              margin-top: 30px;
              padding-top: 16px;
              display: flex;
              gap: 10px;
              align-items: center;
            "
          >
            <span style="font-size: 13px; font-weight: 700; color: var(--mid)">
              Share:
            </span>
            <a
              href="#"
              style="
                background: #1da1f2;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              Twitter
            </a>
            <a
              href="#"
              style="
                background: #0077b5;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              LinkedIn
            </a>
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="sidebar-widget">
            <h4>More Case Studies</h4>
            <div
              class="sidebar-art"
              th:each="a : ${latestCaseStudies}"
              th:if="${a.slug != article.slug}"
            >
              <img
                th:src="${a.imageUrl}
               ?: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=200'"
                style="
                  width: 70px;
                  height: 52px;
                  object-fit: cover;
                  flex-shrink: 0;
                "
              />
              <div>
                <h5>
                  <a
                    th:href="@{/article/{slug}(slug=${a.slug})}"
                    th:text="${a.title}"
                    >Title</a
                  >
                </h5>
                <span
                  style="font-size: 11px; color: var(--muted)"
                  th:text="${a.clientName}"
                  >Client</span
                >
              </div>
            </div>
          </div>

          <div class="sidebar-widget">
            <h4>Topics</h4>
            <a
              th:each="cat : ${categories}"
              th:href="@{/category/{slug}(slug=${cat.slug})}"
              class="sidebar-cat-link"
              th:text="${cat.name}"
              >Category</a
            >
          </div>
        </aside>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
