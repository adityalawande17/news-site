<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('All Articles')}"></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<th:block
  th:replace="~{fragments :: pageHero('All Articles', 'Every article we publish in one place — leadership, technology, startups, and finance coverage from across Decisions Insights, filterable by topic.')}"
></th:block>

<div class="container page-section">
  <div class="cat-pill-bar">
    <a th:href="@{/blog}" class="cat-pill active">All</a>
    <a th:each="cat : ${categories}" th:href="@{/category/{slug}(slug=${cat.slug})}" class="cat-pill" th:text="${cat.name}">Cat</a>
  </div>

  <div class="section-header">
    <h2>All Articles</h2>
  </div>

  <div class="blog-grid">
    <div class="art-card-img" th:each="art : ${articles.content}">
      <a th:href="@{/article/{slug}(slug=${art.slug})}">
        <img th:src="${art.imageUrl} ?: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&auto=format&fit=crop'"
             th:alt="${art.title}" loading="lazy" style="height:200px; object-fit:cover; width:100%;"/>
      </a>
      <div class="art-body" style="padding-top:12px;">
        <div class="art-meta" style="margin-bottom:6px;">
          <span class="cat-tag" th:if="${art.category}" th:text="${art.category.name}">Cat</span>
          <span th:text="${#temporals.format(art.createdAt,'MMM dd, yyyy')}">Date</span>
        </div>
        <h3 style="font-family: Georgia, serif; font-size:17px; line-height:1.35; margin-bottom:8px;">
          <a th:href="@{/article/{slug}(slug=${art.slug})}" th:text="${art.title}">Title</a>
        </h3>
        <p style="font-size:13px; color:#777;" th:text="${#strings.abbreviate(art.summary,120)}">Summary</p>
        <span class="art-meta" th:text="'By ' + ${art.authorName}">Author</span>
      </div>
    </div>
  </div>

  <div class="pagination">
    <a th:if="${currentPage > 0}" th:href="@{/blog(page=${currentPage-1})}">&larr; Prev</a>
    <span class="current" th:text="${currentPage+1} + ' of ' + ${articles.totalPages == 0 ? 1 : articles.totalPages}">1</span>
    <a th:if="${currentPage+1 < articles.totalPages}" th:href="@{/blog(page=${currentPage+1})}">Next &rarr;</a>
  </div>
</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
