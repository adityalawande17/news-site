<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${category.name})}"></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<div class="container page-section">
  <div class="cat-pill-bar">
    <a th:href="@{/blog}" class="cat-pill">All</a>
    <a th:each="cat : ${categories}" th:href="@{/category/{slug}(slug=${cat.slug})}"
       th:classappend="${cat.slug == category.slug} ? ' active' : ''" class="cat-pill" th:text="${cat.name}">Cat</a>
  </div>

  <div class="section-header">
    <h2 th:text="${category.name}">Category</h2>
  </div>
  <p th:if="${category.description}" th:text="${category.description}"
     style="color:#777; font-size:15px; margin-top:-10px; margin-bottom:24px;">Desc</p>

  <div class="blog-grid" th:if="${!articles.content.isEmpty()}">
    <div class="art-card-img" th:each="art : ${articles.content}">
      <a th:href="@{/article/{slug}(slug=${art.slug})}">
        <img th:src="${art.imageUrl} ?: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&auto=format&fit=crop'"
             th:alt="${art.title}" loading="lazy" style="height:200px; object-fit:cover; width:100%;"/>
      </a>
      <div class="art-body" style="padding-top:12px;">
        <div class="art-meta" style="margin-bottom:6px;">
          <span th:text="${#temporals.format(art.createdAt,'MMM dd, yyyy')}">Date</span>
        </div>
        <h3 style="font-family: Georgia, serif; font-size:17px; line-height:1.35; margin-bottom:8px;">
          <a th:href="@{/article/{slug}(slug=${art.slug})}" th:text="${art.title}">Title</a>
        </h3>
        <p style="font-size:13px; color:#777;" th:text="${#strings.abbreviate(art.summary,120)}">Summary</p>
        <span class="art-meta" th:text="'By ' + ${art.authorName}">Author</span>
      </div>
    </div>
  </div>
  <p th:if="${articles.content.isEmpty()}" style="color:#777; padding:40px 0; text-align:center;">
    No articles in this category yet.
  </p>

  <div class="pagination" th:if="${articles.totalPages > 1}">
    <a th:if="${currentPage > 0}" th:href="@{/category/{slug}(slug=${category.slug}, page=${currentPage-1})}">&larr; Prev</a>
    <span class="current" th:text="${currentPage+1} + ' of ' + ${articles.totalPages}">1</span>
    <a th:if="${currentPage+1 < articles.totalPages}" th:href="@{/category/{slug}(slug=${category.slug}, page=${currentPage+1})}">Next &rarr;</a>
  </div>
</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
