<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Videos')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <th:block
      th:replace="~{fragments :: pageHero('Videos', 'Talks, panel discussions, and explainers from business leaders — market trends and executive perspective brought to life on camera.')}"
    ></th:block>

    <div class="container page-section">
      <div class="blog-grid" th:if="${!videos.content.isEmpty()}">
        <div
          th:each="v : ${videos.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--white);
          "
        >
          <!-- Thumbnail with play button overlay -->
          <a
            th:href="@{/video/{slug}(slug=${v.slug})}"
            style="position: relative; display: block"
          >
            <img
              th:src="${v.thumbnailUrl}
             ?: 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=600&auto=format&fit=crop'"
              th:alt="${v.title}"
              loading="lazy"
              style="
                width: 100%;
                height: 190px;
                object-fit: cover;
                display: block;
              "
            />
            <!-- Play button overlay -->
            <div
              style="
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 52px;
                height: 52px;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                color: #fff;
              "
            >
              &#9654;
            </div>
            <!-- Duration badge -->
            <div
              th:if="${v.duration}"
              style="
                position: absolute;
                bottom: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                padding: 2px 7px;
                border-radius: 3px;
              "
              th:text="${v.duration}"
            >
              00:00
            </div>
          </a>

          <div style="padding: 14px">
            <div class="art-meta" style="margin-bottom: 6px">
              <span
                class="cat-tag"
                th:if="${v.category}"
                th:text="${v.category.name}"
                >Cat</span
              >
              <span th:if="${v.host}" th:text="${v.host}">Host</span>
            </div>

            <h3
              style="
                font-family: var(--serif);
                font-size: 16px;
                line-height: 1.35;
                margin-bottom: 6px;
              "
            >
              <a th:href="@{/video/{slug}(slug=${v.slug})}" th:text="${v.title}"
                >Title</a
              >
            </h3>

            <p
              style="font-size: 13px; color: var(--muted); margin-bottom: 10px"
              th:if="${v.description}"
              th:text="${#strings.abbreviate(v.description, 100)}"
            >
              Description
            </p>

            <span
              class="art-meta"
              th:text="${#temporals.format(v.createdAt,'MMM dd, yyyy')}"
            >
              Date
            </span>
          </div>
        </div>
      </div>

      <p
        th:if="${videos.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No videos published yet.
      </p>

      <div class="pagination" th:if="${videos.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/videos(page=${currentPage - 1})}"
          >&larr; Prev</a
        >
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${videos.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < videos.totalPages}"
          th:href="@{/videos(page=${currentPage + 1})}"
          >Next &rarr;</a
        >
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
