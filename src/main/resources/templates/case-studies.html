<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Case Studies')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container page-section">
      <div class="section-header">
        <h2>Case Studies</h2>
      </div>
      <p
        style="
          color: var(--muted);
          font-size: 15px;
          margin-top: -10px;
          margin-bottom: 28px;
        "
      >
        Real problems. Real solutions. Real results.
      </p>

      <div class="blog-grid" th:if="${!caseStudies.content.isEmpty()}">
        <div
          th:each="cs : ${caseStudies.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--white);
          "
        >
          <!-- Cover image -->
          <a th:href="@{/article/{slug}(slug=${cs.slug})}">
            <img
              th:src="${cs.imageUrl}
             ?: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=600&auto=format&fit=crop'"
              th:alt="${cs.title}"
              loading="lazy"
              style="
                width: 100%;
                height: 180px;
                object-fit: cover;
                display: block;
              "
            />
          </a>

          <!-- Result stat bar -->
          <div
            th:if="${cs.caseResult != null}"
            style="
              background: #111;
              color: #fff;
              padding: 10px 14px;
              font-size: 13px;
              font-weight: 700;
              letter-spacing: 0.3px;
            "
          >
            &#10003; <span th:text="${cs.caseResult}">Result</span>
          </div>

          <div style="padding: 14px">
            <!-- Client + Industry -->
            <div
              th:if="${cs.clientName != null}"
              style="
                display: flex;
                gap: 8px;
                align-items: center;
                margin-bottom: 10px;
                flex-wrap: wrap;
              "
            >
              <span
                style="font-size: 12px; font-weight: 700; color: var(--black)"
                th:text="${cs.clientName}"
                >Client</span
              >
              <span
                th:if="${cs.clientIndustry}"
                style="
                  font-size: 11px;
                  color: var(--muted);
                  border-left: 1px solid var(--border);
                  padding-left: 8px;
                "
                th:text="${cs.clientIndustry}"
                >Industry</span
              >
            </div>

            <!-- Title -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 17px;
                line-height: 1.35;
                margin-bottom: 8px;
              "
            >
              <a
                th:href="@{/article/{slug}(slug=${cs.slug})}"
                th:text="${cs.title}"
                >Title</a
              >
            </h3>

            <!-- Summary -->
            <p
              style="font-size: 13px; color: var(--muted); margin-bottom: 12px"
              th:text="${#strings.abbreviate(cs.summary, 110)}"
            >
              Summary
            </p>

            <a
              th:href="@{/article/{slug}(slug=${cs.slug})}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
            >
              Read Case Study &rarr;
            </a>
          </div>
        </div>
      </div>

      <p
        th:if="${caseStudies.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No case studies published yet.
      </p>

      <div class="pagination" th:if="${caseStudies.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/case-studies(page=${currentPage - 1})}"
          >&larr; Prev</a
        >
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${caseStudies.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < caseStudies.totalPages}"
          th:href="@{/case-studies(page=${currentPage + 1})}"
          >Next &rarr;</a
        >
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
