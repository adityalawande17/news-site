<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${article.title})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container article-page">
      <div class="art-header">
        <!-- For Immediate Release header -->
        <div
          style="
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            margin-bottom: 10px;
          "
        >
          For Immediate Release &nbsp;&middot;&nbsp;
          <span
            th:text="${#temporals.format(article.createdAt,'MMMM dd, yyyy')}"
          >
            Date
          </span>
        </div>

        <span
          class="cat-tag"
          style="display: inline-block; margin-bottom: 10px"
        >
          Press Release
        </span>

        <h1 th:text="${article.title}">Title</h1>

        <!-- Company bar -->
        <div
          th:if="${article.pressCompanyName != null}"
          style="
            background: #f5f5f5;
            padding: 12px 16px;
            border-left: 4px solid var(--black);
            margin: 14px 0;
          "
        >
          <span
            style="font-size: 13px; font-weight: 700"
            th:text="${article.pressCompanyName}"
            >Company</span
          >
        </div>

        <div class="art-byline">
          <span
            th:text="${#temporals.format(article.createdAt,'MMMM dd, yyyy')}"
          >
            Date
          </span>
          &nbsp;&middot;&nbsp;
          <span th:text="${article.views} + ' views'">Views</span>
        </div>
      </div>

      <!-- Cover image -->
      <img
        class="art-cover"
        th:if="${article.imageUrl}"
        th:src="${article.imageUrl}"
        th:alt="${article.title}"
      />

      <!-- Two-column layout -->
      <div class="article-layout">
        <div>
          <div class="article-body">
            <p class="summary-quote" th:text="${article.summary}">Summary</p>
            <div th:utext="${article.content}">Content</div>
          </div>

          <!-- Media contact box -->
          <div
            th:if="${article.pressContactName != null
                   or article.pressContactEmail != null}"
            style="
              border: 1px solid var(--border);
              border-radius: 6px;
              padding: 20px;
              margin-top: 30px;
              background: var(--surface);
            "
          >
            <div
              style="
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted);
                margin-bottom: 10px;
              "
            >
              Media Contact
            </div>
            <div
              style="font-size: 15px; font-weight: 700; color: var(--black)"
              th:text="${article.pressContactName}"
            >
              Name
            </div>
            <div style="font-size: 14px; color: var(--muted); margin-top: 4px">
              <a
                th:href="'mailto:' + ${article.pressContactEmail}"
                th:text="${article.pressContactEmail}"
                style="color: var(--red)"
                >Email</a
              >
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="sidebar-widget">
            <h4>More Press Releases</h4>
            <div
              class="sidebar-art"
              th:each="a : ${latestPressReleases}"
              th:if="${a.slug != article.slug}"
            >
              <div style="flex: 1">
                <h5 style="margin-bottom: 3px">
                  <a
                    th:href="@{/article/{slug}(slug=${a.slug})}"
                    th:text="${a.title}"
                    >Title</a
                  >
                </h5>
                <span
                  style="font-size: 11px; color: var(--muted)"
                  th:text="${a.pressCompanyName}"
                  >Company</span
                >
              </div>
            </div>
          </div>

          <div class="sidebar-widget">
            <h4>Topics</h4>
            <a
              th:each="cat : ${categories}"
              th:href="@{/category/{slug}(slug=${cat.slug})}"
              class="sidebar-cat-link"
              th:text="${cat.name}"
              >Category</a
            >
          </div>
        </aside>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
