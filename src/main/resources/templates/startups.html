<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Startups')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <th:block
      th:replace="~{fragments :: pageHero('Startups', 'Discover the early-stage companies and founders defining what\'s next — tracking funding stages, sectors, and the stories behind the businesses being built right now.')}"
    ></th:block>

    <div class="container page-section">
      <!-- Filter row: sector · stage · location — one form, any change re-submits all three -->
      <form
        th:action="@{/startups}"
        method="get"
        style="
          display: flex;
          align-items: center;
          gap: 20px;
          flex-wrap: wrap;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <div style="display: flex; align-items: center; gap: 8px">
          <label
            for="sectorFilter"
            style="
              font-size: 13px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.4px;
            "
            >Sector</label
          >
          <select
            id="sectorFilter"
            name="sector"
            onchange="this.form.submit()"
            style="
              padding: 7px 14px;
              border-radius: 20px;
              font-size: 13px;
              font-weight: 700;
              border: 1px solid var(--border);
              background: #fff;
              color: #333;
              cursor: pointer;
            "
          >
            <option value="" th:selected="${activeSector == null}">
              All Sectors
            </option>
            <option
              th:each="sec : ${sectors}"
              th:value="${sec}"
              th:text="${sec}"
              th:selected="${activeSector == sec}"
            >
              Sector
            </option>
          </select>
        </div>

        <div style="display: flex; align-items: center; gap: 8px">
          <label
            for="stageFilter"
            style="
              font-size: 13px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.4px;
            "
            >Stage</label
          >
          <select
            id="stageFilter"
            name="stage"
            onchange="this.form.submit()"
            style="
              padding: 7px 14px;
              border-radius: 20px;
              font-size: 13px;
              font-weight: 700;
              border: 1px solid var(--border);
              background: #fff;
              color: #333;
              cursor: pointer;
            "
          >
            <option value="" th:selected="${activeStage == null}">
              All Stages
            </option>
            <option
              th:each="stage : ${fundingStages}"
              th:value="${stage}"
              th:text="${stage.label}"
              th:selected="${activeStage == stage}"
            >
              Stage
            </option>
          </select>
        </div>

        <div style="display: flex; align-items: center; gap: 8px">
          <label
            for="cityFilter"
            style="
              font-size: 13px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.4px;
            "
            >Location</label
          >
          <select
            id="cityFilter"
            name="city"
            onchange="this.form.submit()"
            style="
              padding: 7px 14px;
              border-radius: 20px;
              font-size: 13px;
              font-weight: 700;
              border: 1px solid var(--border);
              background: #fff;
              color: #333;
              cursor: pointer;
            "
          >
            <option value="" th:selected="${activeCity == null}">
              All Locations
            </option>
            <option
              th:each="c : ${cities}"
              th:value="${c}"
              th:text="${c}"
              th:selected="${activeCity == c}"
            >
              City
            </option>
          </select>
        </div>
      </form>

      <!-- Startup cards -->
      <div class="blog-grid" th:if="${!startups.content.isEmpty()}">
        <div
          th:each="st : ${startups.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--white);
            transition: box-shadow 0.2s;
          "
          onmouseover="this.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <!-- Header strip -->
          <div style="height: 80px; background: #111; position: relative">
            <img
              th:if="${st.coverImageUrl}"
              th:src="${st.coverImageUrl}"
              loading="lazy"
              style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5"
            />
            <div style="position: absolute; bottom: -18px; left: 14px">
              <img
                th:if="${st.logoUrl}"
                th:src="${st.logoUrl}"
                loading="lazy"
                style="
                  width: 36px;
                  height: 36px;
                  object-fit: contain;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  padding: 3px;
                "
              />
              <div
                th:unless="${st.logoUrl}"
                style="
                  width: 36px;
                  height: 36px;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 14px;
                "
              >
                &#128640;
              </div>
            </div>
            <!-- Funding stage badge -->
            <div
              th:if="${st.fundingStage != null}"
              style="
                position: absolute;
                top: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.7);
                color: #fff;
                font-size: 10px;
                font-weight: 700;
                padding: 3px 8px;
                border-radius: 10px;
              "
              th:text="${st.fundingStage.label}"
            >
              Stage
            </div>
          </div>

          <div style="padding: 26px 14px 16px">
            <!-- Sector -->
            <div
              th:if="${st.sector}"
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 4px;
              "
              th:text="${st.sector}"
            >
              Sector
            </div>

            <!-- Name -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
              "
            >
              <a
                th:href="@{/startup/{slug}(slug=${st.slug})}"
                th:text="${st.name}"
                >Name</a
              >
            </h3>

            <!-- Pitch -->
            <p
              th:if="${st.pitch}"
              style="
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 12px;
                line-height: 1.5;
              "
              th:text="${#strings.abbreviate(st.pitch, 100)}"
            >
              Pitch
            </p>

            <!-- Quick stats -->
            <div
              style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 12px;
              "
            >
              <span th:if="${st.city}" th:text="'&#128205; ' + ${st.city}"
                >City</span
              >
              <span
                th:if="${st.foundingYear}"
                th:text="'Est. ' + ${st.foundingYear}"
                >Year</span
              >
              <span
                th:if="${st.amountRaised}"
                style="font-weight: 700; color: var(--black)"
                th:text="${st.amountRaised}"
                >Amount</span
              >
            </div>

            <a
              th:href="@{/startup/{slug}(slug=${st.slug})}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
            >
              View Profile &rarr;
            </a>
          </div>
        </div>
      </div>

      <p
        th:if="${startups.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No startups found.
      </p>

      <!-- Pagination — preserves sector/stage/city params (Thymeleaf omits null ones) -->
      <div class="pagination" th:if="${startups.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/startups(sector=${activeSector}, stage=${activeStage}, city=${activeCity}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${startups.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < startups.totalPages}"
          th:href="@{/startups(sector=${activeSector}, stage=${activeStage}, city=${activeCity}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
