<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${company.name})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container" style="padding-bottom: 60px">
      <!-- Cover banner -->
      <div
        style="
          height: 220px;
          background: #111;
          border-radius: 0 0 8px 8px;
          position: relative;
          overflow: hidden;
          margin: 0 -20px;
        "
      >
        <img
          th:if="${company.coverImageUrl}"
          th:src="${company.coverImageUrl}"
          style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6"
        />
      </div>

      <!-- Company header card -->
      <div
        style="
          background: var(--white);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 24px;
          margin-top: -40px;
          position: relative;
          z-index: 1;
          margin-bottom: 32px;
        "
      >
        <div
          style="
            display: flex;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
          "
        >
          <!-- Logo -->
          <img
            th:if="${company.logoUrl}"
            th:src="${company.logoUrl}"
            style="
              width: 80px;
              height: 80px;
              object-fit: contain;
              background: #f5f5f5;
              border: 1px solid var(--border);
              border-radius: 10px;
              padding: 8px;
              flex-shrink: 0;
            "
          />
          <div
            th:unless="${company.logoUrl}"
            style="
              width: 80px;
              height: 80px;
              background: #f5f5f5;
              border: 1px solid var(--border);
              border-radius: 10px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 36px;
              flex-shrink: 0;
            "
          >
            &#127970;
          </div>

          <div style="flex: 1">
            <!-- Sector -->
            <div
              th:if="${company.sector}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.6px;
                margin-bottom: 6px;
              "
              th:text="${company.sector}"
            >
              Sector
            </div>

            <h1
              style="
                font-family: var(--serif);
                font-size: 32px;
                margin-bottom: 6px;
                line-height: 1.2;
              "
              th:text="${company.name}"
            >
              Name
            </h1>

            <p
              th:if="${company.tagline}"
              style="font-size: 16px; color: var(--muted); margin-bottom: 14px"
              th:text="${company.tagline}"
            >
              Tagline
            </p>

            <!-- External links -->
            <div style="display: flex; gap: 10px; flex-wrap: wrap">
              <a
                th:if="${company.websiteUrl}"
                th:href="${company.websiteUrl}"
                target="_blank"
                style="
                  background: var(--black);
                  color: #fff;
                  padding: 8px 18px;
                  font-size: 13px;
                  font-weight: 700;
                  border-radius: 4px;
                  text-decoration: none;
                "
              >
                &#127758; Visit Website
              </a>
              <a
                th:if="${company.linkedinUrl}"
                th:href="${company.linkedinUrl}"
                target="_blank"
                style="
                  background: #0077b5;
                  color: #fff;
                  padding: 8px 18px;
                  font-size: 13px;
                  font-weight: 700;
                  border-radius: 4px;
                  text-decoration: none;
                "
              >
                in LinkedIn
              </a>
            </div>
          </div>
        </div>

        <!-- Stats bar -->
        <div
          style="
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
          "
        >
          <div
            th:if="${company.foundingYear}"
            style="
              text-align: center;
              padding: 0 16px;
              border-right: 1px solid var(--border);
            "
          >
            <div
              style="
                font-family: var(--serif);
                font-size: 24px;
                font-weight: 700;
              "
              th:text="${company.foundingYear}"
            >
              Year
            </div>
            <div
              style="
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 3px;
              "
            >
              Founded
            </div>
          </div>
          <div
            th:if="${company.employeeCount}"
            style="
              text-align: center;
              padding: 0 16px;
              border-right: 1px solid var(--border);
            "
          >
            <div
              style="
                font-family: var(--serif);
                font-size: 24px;
                font-weight: 700;
              "
              th:text="${company.employeeCount}"
            >
              Count
            </div>
            <div
              style="
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 3px;
              "
            >
              Employees
            </div>
          </div>
          <div
            th:if="${company.annualRevenue}"
            style="
              text-align: center;
              padding: 0 16px;
              border-right: 1px solid var(--border);
            "
          >
            <div
              style="
                font-family: var(--serif);
                font-size: 24px;
                font-weight: 700;
              "
              th:text="${company.annualRevenue}"
            >
              Revenue
            </div>
            <div
              style="
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 3px;
              "
            >
              Annual Revenue
            </div>
          </div>
          <div
            th:if="${company.ceoName}"
            style="text-align: center; padding: 0 16px"
          >
            <div
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
              "
              th:text="${company.ceoName}"
            >
              CEO
            </div>
            <div
              style="
                font-size: 11px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-top: 3px;
              "
            >
              CEO
            </div>
          </div>
        </div>
      </div>

      <!-- Two-column layout -->
      <div style="display: grid; grid-template-columns: 1fr 280px; gap: 32px">
        <!-- Left: description -->
        <div>
          <div class="section-header" style="margin-bottom: 16px">
            <h2>About <span th:text="${company.name}">Company</span></h2>
          </div>
          <div
            style="font-size: 16px; line-height: 1.85; color: var(--dark)"
            th:text="${company.description}"
          >
            Description
          </div>
        </div>

        <!-- Right: sidebar -->
        <aside>
          <div class="sidebar-widget">
            <h4>Company Details</h4>

            <div
              th:if="${company.headquarters}"
              style="padding: 8px 0; border-bottom: 1px solid var(--border)"
            >
              <div
                style="
                  font-size: 11px;
                  color: var(--muted);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                Headquarters
              </div>
              <div
                style="font-size: 14px; font-weight: 600; margin-top: 3px"
                th:text="${company.headquarters}"
              >
                HQ
              </div>
            </div>

            <div
              th:if="${company.sector}"
              style="padding: 8px 0; border-bottom: 1px solid var(--border)"
            >
              <div
                style="
                  font-size: 11px;
                  color: var(--muted);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                Sector
              </div>
              <div
                style="font-size: 14px; font-weight: 600; margin-top: 3px"
                th:text="${company.sector}"
              >
                Sector
              </div>
            </div>

            <div
              th:if="${company.ceoName}"
              style="padding: 8px 0; border-bottom: 1px solid var(--border)"
            >
              <div
                style="
                  font-size: 11px;
                  color: var(--muted);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                CEO
              </div>
              <div
                style="font-size: 14px; font-weight: 600; margin-top: 3px"
                th:text="${company.ceoName}"
              >
                CEO
              </div>
            </div>

            <div th:if="${company.foundingYear}" style="padding: 8px 0">
              <div
                style="
                  font-size: 11px;
                  color: var(--muted);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                Founded
              </div>
              <div
                style="font-size: 14px; font-weight: 600; margin-top: 3px"
                th:text="${company.foundingYear}"
              >
                Year
              </div>
            </div>
          </div>

          <!-- Other featured companies -->
          <div class="sidebar-widget">
            <h4>Other Companies</h4>
            <div
              th:each="co : ${featured_companies}"
              th:if="${co.slug != company.slug}"
              style="
                display: flex;
                gap: 10px;
                margin-bottom: 12px;
                align-items: center;
              "
            >
              <img
                th:if="${co.logoUrl}"
                th:src="${co.logoUrl}"
                style="
                  width: 36px;
                  height: 36px;
                  object-fit: contain;
                  border: 1px solid var(--border);
                  border-radius: 6px;
                  padding: 3px;
                  flex-shrink: 0;
                "
              />
              <div
                th:unless="${co.logoUrl}"
                style="
                  width: 36px;
                  height: 36px;
                  background: var(--light-bg);
                  border: 1px solid var(--border);
                  border-radius: 6px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 14px;
                  flex-shrink: 0;
                "
              >
                &#127970;
              </div>
              <div>
                <a
                  th:href="@{/company/{slug}(slug=${co.slug})}"
                  th:text="${co.name}"
                  style="
                    font-size: 13px;
                    font-weight: 700;
                    font-family: var(--serif);
                  "
                  >Name</a
                >
                <div
                  style="font-size: 11px; color: var(--muted)"
                  th:text="${co.sector}"
                >
                  Sector
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
