<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${magazine.title})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div
      th:with="hasPdf=${!#strings.isEmpty(magazine.pdfUrl)}"
      style="padding-top: 20px; padding-bottom: 30px"
    >
      <!-- Flipbook reader — full viewport width, not confined to .container,
           so it has as much room as possible to grow into -->
      <link
        th:if="${hasPdf}"
        rel="stylesheet"
        th:href="@{/vendor/pageflip/page-flip.css}"
      />
      <div th:if="${hasPdf}" style="padding: 0 20px">
        <div
          id="flipbookStatus"
          style="text-align: center; padding: 60px 0; color: var(--muted)"
        >
          Loading flipbook&hellip;
        </div>

        <div id="flipbookWrap" style="display: none; justify-content: center">
          <div id="flipbookSizer">
            <div
              id="flipbookViewer"
              th:data-pdf-url="${magazine.pdfUrl}"
            ></div>
          </div>
        </div>

        <div
          id="flipbookNav"
          style="
            display: none;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
          "
        >
          <button
            id="flipPrev"
            type="button"
            style="
              background: var(--black);
              color: #fff;
              border: none;
              padding: 9px 20px;
              font-size: 13px;
              font-weight: 700;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            &larr; Prev
          </button>
          <span
            id="flipPageIndicator"
            style="font-size: 13px; font-weight: 700; color: var(--muted)"
          ></span>
          <button
            id="flipNext"
            type="button"
            style="
              background: var(--black);
              color: #fff;
              border: none;
              padding: 9px 20px;
              font-size: 13px;
              font-weight: 700;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Next &rarr;
          </button>
        </div>
      </div>

      <!-- No PDF uploaded yet for this issue -->
      <div th:unless="${hasPdf}" class="container">
        <p style="text-align: center; padding: 80px 0; color: var(--muted)">
          No flipbook available for this issue yet.
        </p>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>

    <th:block th:if="${!#strings.isEmpty(magazine.pdfUrl)}">
      <script th:src="@{/vendor/pdfjs/pdf.min.js}"></script>
      <script th:src="@{/vendor/pageflip/page-flip.browser.js}"></script>
      <script th:src="@{/js/flipbook.js}"></script>
    </th:block>
  </body>
</html>
