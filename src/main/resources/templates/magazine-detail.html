<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${magazine.title})}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container" style="padding-top: 36px; padding-bottom: 60px">
      <!-- Issue header -->
      <div
        style="
          display: grid;
          grid-template-columns: 180px 1fr;
          gap: 32px;
          align-items: flex-start;
          margin-bottom: 40px;
        "
      >
        <!-- Cover -->
        <img
          th:src="${magazine.coverImageUrl}
         ?: 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'"
          th:alt="${magazine.title}"
          style="
            width: 100%;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
          "
        />

        <div>
          <div
            style="
              font-size: 11px;
              font-weight: 700;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--muted);
              margin-bottom: 8px;
            "
          >
            Issue #<span th:text="${magazine.issueNumber}">0</span>
            &nbsp;&middot;&nbsp;
            <span th:text="${magazine.month} + ' ' + ${magazine.year}">
              Month Year
            </span>
          </div>

          <h1
            style="
              font-family: var(--serif);
              font-size: 36px;
              line-height: 1.2;
              margin-bottom: 12px;
            "
            th:text="${magazine.title}"
          >
            Title
          </h1>

          <p
            th:if="${magazine.description}"
            style="
              font-size: 16px;
              line-height: 1.7;
              color: var(--mid);
              margin-bottom: 22px;
            "
            th:text="${magazine.description}"
          >
            Description
          </p>

          <div style="display: flex; gap: 12px; flex-wrap: wrap">
            <a
              th:if="${magazine.pdfUrl}"
              th:href="${magazine.pdfUrl}"
              target="_blank"
              style="
                background: var(--red);
                color: #fff;
                padding: 11px 24px;
                font-size: 13px;
                font-weight: 700;
                border-radius: 4px;
                display: inline-block;
              "
            >
              &#8595; Download PDF
            </a>
            <a
              th:href="@{/magazine}"
              style="
                background: var(--black);
                color: #fff;
                padding: 11px 24px;
                font-size: 13px;
                font-weight: 700;
                border-radius: 4px;
                display: inline-block;
              "
            >
              All Issues
            </a>
          </div>
        </div>
      </div>

      <!-- Featured articles in this issue -->
      <div th:if="${!magazine.featuredArticles.isEmpty()}">
        <div class="section-header">
          <h2>In This Issue</h2>
        </div>

        <div class="blog-grid">
          <div
            th:each="art : ${magazine.featuredArticles}"
            style="
              border: 1px solid var(--border);
              border-radius: 6px;
              overflow: hidden;
              background: var(--white);
            "
          >
            <a th:href="@{/article/{slug}(slug=${art.slug})}">
              <img
                th:src="${art.imageUrl}
               ?: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=600'"
                th:alt="${art.title}"
                loading="lazy"
                style="
                  width: 100%;
                  height: 180px;
                  object-fit: cover;
                  display: block;
                "
              />
            </a>

            <div style="padding: 14px">
              <div class="art-meta" style="margin-bottom: 6px">
                <span
                  class="cat-tag"
                  th:if="${art.category}"
                  th:text="${art.category.name}"
                  >Cat</span
                >
                <span
                  th:text="${#strings.replace(art.articleType.toString(),
                             '_', ' ')}"
                  >Type</span
                >
              </div>
              <h3
                style="
                  font-family: var(--serif);
                  font-size: 16px;
                  line-height: 1.35;
                  margin-bottom: 6px;
                "
              >
                <a
                  th:href="@{/article/{slug}(slug=${art.slug})}"
                  th:text="${art.title}"
                  >Title</a
                >
              </h3>
              <p
                style="font-size: 13px; color: var(--muted)"
                th:text="${#strings.abbreviate(art.summary, 100)}"
              >
                Summary
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar: other issues -->
      <div
        style="
          margin-top: 48px;
          border-top: 1px solid var(--border);
          padding-top: 32px;
        "
      >
        <div class="section-header">
          <h2>Other Issues</h2>
          <a th:href="@{/magazine}" class="view-all">View All &rarr;</a>
        </div>
        <div
          style="
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
          "
        >
          <div
            th:each="issue : ${latestIssues}"
            th:if="${issue.slug != magazine.slug}"
            style="
              border: 1px solid var(--border);
              border-radius: 6px;
              overflow: hidden;
              text-align: center;
              padding-bottom: 12px;
            "
          >
            <a th:href="@{/magazine/{slug}(slug=${issue.slug})}">
              <img
                th:src="${issue.coverImageUrl}
               ?: 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=300'"
                loading="lazy"
                style="width: 100%; height: 140px; object-fit: cover"
              />
            </a>
            <div style="padding: 8px 12px 4px">
              <div
                style="font-size: 10px; font-weight: 700; color: var(--muted)"
                th:text="'Issue #' + ${issue.issueNumber}"
              >
                Issue
              </div>
              <div
                style="
                  font-family: var(--serif);
                  font-size: 13px;
                  font-weight: 700;
                "
                th:text="${issue.title}"
              >
                Title
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
