<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Magazine')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container page-section">
      <div class="section-header">
        <h2>Magazine</h2>
      </div>

      <!-- Region filter buttons -->
      <div
        style="
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <a
          th:href="@{/magazine}"
          style="
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid var(--border);
          "
          th:style="${activeRegion == null}
                 ? 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111;'
                 : 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid #ddd;'"
        >
          All Regions
        </a>

        <a
          th:each="reg : ${regions}"
          th:href="@{/magazine(region=${reg})}"
          th:text="${reg.label}"
          th:style="${activeRegion == reg}
                 ? 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none;'
                 : 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid #ddd; text-decoration:none;'"
        >
          Region
        </a>
      </div>

      <!-- Active region heading -->
      <div th:if="${activeRegion != null}" style="margin-bottom: 20px">
        <h3
          style="
            font-family: var(--serif);
            font-size: 20px;
            color: var(--black);
          "
          th:text="${activeRegion.label} + ' Edition'"
        >
          Region Edition
        </h3>
      </div>

      <!-- Magazine cover grid — covers only, 5 per page -->
      <div class="magazine-cover-grid" th:if="${!magazines.content.isEmpty()}">
        <a
          th:each="mag : ${magazines.content}"
          th:href="@{/magazine/{slug}(slug=${mag.slug})}"
          class="magazine-cover-link"
        >
          <img
            th:src="${mag.coverImageUrl}
           ?: 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'"
            th:alt="${mag.title}"
            loading="lazy"
          />
        </a>
      </div>

      <p
        th:if="${magazines.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No issues published
        <span
          th:if="${activeRegion != null}"
          th:text="' for ' + ${activeRegion.label} + ' yet.'"
          >yet.</span
        >
        <span th:unless="${activeRegion != null}"> yet.</span>
      </p>

      <!-- Pagination — preserve region param -->
      <div class="pagination" th:if="${magazines.totalPages > 1}">
        <a
          th:if="${currentPage > 0 and activeRegion != null}"
          th:href="@{/magazine(region=${activeRegion}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <a
          th:if="${currentPage > 0 and activeRegion == null}"
          th:href="@{/magazine(page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${magazines.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < magazines.totalPages and activeRegion != null}"
          th:href="@{/magazine(region=${activeRegion}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
        <a
          th:if="${currentPage + 1 < magazines.totalPages and activeRegion == null}"
          th:href="@{/magazine(page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
