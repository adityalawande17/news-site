<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Magazine')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <th:block
      th:replace="~{fragments :: pageHero('Magazine', 'Our regular digital issue gathers the best of Decisions Insights into one curated read — in-depth stories, interviews, and analysis organized by region.')}"
    ></th:block>

    <div class="container page-section">
      <!-- Filter row: region · year · sort — one form, any change re-submits all three -->
      <form
        th:action="@{/magazine}"
        method="get"
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 20px;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <div
          style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap"
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <label
              for="regionFilter"
              style="
                font-size: 13px;
                font-weight: 700;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
              >Region</label
            >
            <select
              id="regionFilter"
              name="region"
              onchange="this.form.submit()"
              style="
                padding: 7px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 700;
                border: 1px solid var(--border);
                background: #fff;
                color: #333;
                cursor: pointer;
              "
            >
              <option value="" th:selected="${activeRegion == null}">
                All Regions
              </option>
              <option
                th:each="reg : ${regions}"
                th:value="${reg}"
                th:text="${reg.label}"
                th:selected="${activeRegion == reg}"
              >
                Region
              </option>
            </select>
          </div>

          <div style="display: flex; align-items: center; gap: 8px">
            <label
              for="yearFilter"
              style="
                font-size: 13px;
                font-weight: 700;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
              >Year</label
            >
            <select
              id="yearFilter"
              name="year"
              onchange="this.form.submit()"
              style="
                padding: 7px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 700;
                border: 1px solid var(--border);
                background: #fff;
                color: #333;
                cursor: pointer;
              "
            >
              <option value="" th:selected="${activeYear == null}">
                All Years
              </option>
              <option
                th:each="yr : ${years}"
                th:value="${yr}"
                th:text="${yr}"
                th:selected="${activeYear != null and activeYear == yr}"
              >
                2026
              </option>
            </select>
          </div>

          <div style="display: flex; align-items: center; gap: 8px">
            <label
              for="sortFilter"
              style="
                font-size: 13px;
                font-weight: 700;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
              >Sort by Year</label
            >
            <select
              id="sortFilter"
              name="sort"
              onchange="this.form.submit()"
              style="
                padding: 7px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 700;
                border: 1px solid var(--border);
                background: #fff;
                color: #333;
                cursor: pointer;
              "
            >
              <option value="desc" th:selected="${activeSort == 'desc'}">
                Newest First
              </option>
              <option value="asc" th:selected="${activeSort == 'asc'}">
                Oldest First
              </option>
            </select>
          </div>
        </div>
      </form>

      <!-- Active region / year heading -->
      <div
        th:if="${activeRegion != null or activeYear != null}"
        style="margin-bottom: 20px"
      >
        <h3
          style="
            font-family: var(--serif);
            font-size: 20px;
            color: var(--black);
          "
          th:text="${(activeRegion != null ? activeRegion.label + ' ' : '')
                  + (activeYear != null ? activeYear + ' ' : '')
                  + 'Edition'}"
        >
          Region Edition
        </h3>
      </div>

      <!-- Magazine cover grid — covers only, 5 per page -->
      <div class="magazine-cover-grid" th:if="${!magazines.content.isEmpty()}">
        <a
          th:each="mag : ${magazines.content}"
          th:href="@{/magazine/{slug}(slug=${mag.slug})}"
          class="magazine-cover-link"
        >
          <img
            th:src="${mag.coverImageUrl}
           ?: 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'"
            th:alt="${mag.title}"
            loading="lazy"
          />
        </a>
      </div>

      <p
        th:if="${magazines.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No issues published
        <span
          th:text="${(activeRegion != null ? ' for ' + activeRegion.label : '')
                  + (activeYear != null ? ' in ' + activeYear : '')
                  + ' yet.'}"
          >yet.</span
        >
      </p>

      <!-- Pagination — preserves region/year/sort params (Thymeleaf omits null ones) -->
      <div class="pagination" th:if="${magazines.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/magazine(region=${activeRegion}, year=${activeYear}, sort=${activeSort}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${magazines.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < magazines.totalPages}"
          th:href="@{/magazine(region=${activeRegion}, year=${activeYear}, sort=${activeSort}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
