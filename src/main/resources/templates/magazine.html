<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Magazine')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container page-section">
      <div class="section-header">
        <h2>Magazine</h2>
      </div>

      <!-- Region filter buttons -->
      <div
        style="
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <a
          th:href="@{/magazine}"
          style="
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid var(--border);
          "
          th:style="${activeRegion == null}
                 ? 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111;'
                 : 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid #ddd;'"
        >
          All Regions
        </a>

        <a
          th:each="reg : ${regions}"
          th:href="@{/magazine(region=${reg})}"
          th:text="${reg.label}"
          th:style="${activeRegion == reg}
                 ? 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none;'
                 : 'padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid #ddd; text-decoration:none;'"
        >
          Region
        </a>
      </div>

      <!-- Active region heading -->
      <div th:if="${activeRegion != null}" style="margin-bottom: 20px">
        <h3
          style="
            font-family: var(--serif);
            font-size: 20px;
            color: var(--black);
          "
          th:text="${activeRegion.label} + ' Edition'"
        >
          Region Edition
        </h3>
      </div>

      <!-- Magazine grid -->
      <div class="blog-grid" th:if="${!magazines.content.isEmpty()}">
        <div
          th:each="mag : ${magazines.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--white);
          "
        >
          <a th:href="@{/magazine/{slug}(slug=${mag.slug})}">
            <img
              th:src="${mag.coverImageUrl}
             ?: 'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'"
              th:alt="${mag.title}"
              loading="lazy"
              style="
                width: 100%;
                height: 220px;
                object-fit: cover;
                display: block;
              "
            />
          </a>

          <!-- Region badge -->
          <div
            th:if="${mag.region != null}"
            style="
              background: #111;
              color: #fff;
              padding: 6px 14px;
              font-size: 11px;
              font-weight: 700;
              text-transform: uppercase;
              letter-spacing: 0.6px;
            "
            th:text="${mag.region.label}"
          >
            Region
          </div>

          <div style="padding: 16px">
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--muted);
                margin-bottom: 6px;
              "
              th:text="'Issue #' + ${mag.issueNumber}
                       + ' · ' + ${mag.month} + ' ' + ${mag.year}"
            >
              Issue
            </div>

            <h3
              style="
                font-family: var(--serif);
                font-size: 18px;
                line-height: 1.3;
                margin-bottom: 8px;
              "
            >
              <a
                th:href="@{/magazine/{slug}(slug=${mag.slug})}"
                th:text="${mag.title}"
                >Title</a
              >
            </h3>

            <p
              th:if="${mag.description}"
              style="font-size: 13px; color: var(--muted); margin-bottom: 12px"
              th:text="${#strings.abbreviate(mag.description, 100)}"
            >
              Description
            </p>

            <div style="display: flex; gap: 10px">
              <a
                th:href="@{/magazine/{slug}(slug=${mag.slug})}"
                style="
                  font-size: 12px;
                  font-weight: 700;
                  color: var(--red);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                Read &rarr;
              </a>
              <a
                th:if="${mag.pdfUrl}"
                th:href="${mag.pdfUrl}"
                target="_blank"
                style="
                  font-size: 12px;
                  font-weight: 700;
                  color: var(--muted);
                  text-transform: uppercase;
                  letter-spacing: 0.4px;
                "
              >
                &#8595; PDF
              </a>
            </div>
          </div>
        </div>
      </div>

      <p
        th:if="${magazines.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No issues published
        <span
          th:if="${activeRegion != null}"
          th:text="' for ' + ${activeRegion.label} + ' yet.'"
          >yet.</span
        >
        <span th:unless="${activeRegion != null}"> yet.</span>
      </p>

      <!-- Pagination — preserve region param -->
      <div class="pagination" th:if="${magazines.totalPages > 1}">
        <a
          th:if="${currentPage > 0 and activeRegion != null}"
          th:href="@{/magazine(region=${activeRegion}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <a
          th:if="${currentPage > 0 and activeRegion == null}"
          th:href="@{/magazine(page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${magazines.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < magazines.totalPages and activeRegion != null}"
          th:href="@{/magazine(region=${activeRegion}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
        <a
          th:if="${currentPage + 1 < magazines.totalPages and activeRegion == null}"
          th:href="@{/magazine(page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
