<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Search')}" ></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<div class="container page-section">
  <div class="section-header">
    <h2>Search: <em th:text="${query}" style="font-style:italic; color:#777;">q</em></h2>
  </div>

  <p th:if="${results.isEmpty()}" style="color:#777; padding:30px 0;">
    No articles found for "<span th:text="${query}">q</span>". Try a different keyword.
  </p>

  <div class="blog-grid" th:if="${!results.isEmpty()}">
    <div class="art-card-img" th:each="art : ${results}">
      <a th:href="@{/article/{slug}(slug=${art.slug})}">
        <img th:src="${art.imageUrl} ?: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&auto=format&fit=crop'"
             th:alt="${art.title}" loading="lazy" style="height:180px; object-fit:cover; width:100%;"/>
      </a>
      <div class="art-body" style="padding-top:12px;">
        <div class="art-meta" style="margin-bottom:6px;">
          <span class="cat-tag" th:if="${art.category}" th:text="${art.category.name}">Cat</span>
        </div>
        <h3 style="font-family:Georgia,serif; font-size:16px; line-height:1.35;">
          <a th:href="@{/article/{slug}(slug=${art.slug})}" th:text="${art.title}">Title</a>
        </h3>
        <p style="font-size:13px; color:#777;" th:text="${#strings.abbreviate(art.summary,100)}">Summary</p>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
