<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${article.title})}"></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<div class="container article-page">
  <div class="art-header">
    <span class="cat-tag" th:if="${article.category}">
      <a th:href="@{/category/{slug}(slug=${article.category.slug})}" th:text="${article.category.name}">Cat</a>
    </span>
    <h1 th:text="${article.title}">Title</h1>
    <div class="art-byline">
      By <strong th:text="${article.authorName} ?: 'Editorial Team'">Author</strong>
      &nbsp;&middot;&nbsp;
      <span th:text="${#temporals.format(article.createdAt,'MMMM dd, yyyy')}">Date</span>
      &nbsp;&middot;&nbsp;
      <span th:text="${article.views} + ' views'">Views</span>
    </div>
  </div>

  <img class="art-cover"
       th:if="${article.imageUrl}"
       th:src="${article.imageUrl}"
       th:alt="${article.title}"/>

  <div class="article-layout">
    <div>
      <div class="article-body">
        <p class="summary-quote" th:text="${article.summary}">Summary</p>
        <div th:utext="${article.content}">Content</div>
      </div>
    </div>
    <aside>
      <div class="sidebar-widget">
        <h4>Latest Articles</h4>
        <div class="sidebar-art" th:each="a : ${latest}" th:if="${a.slug != article.slug}">
          <a th:href="@{/article/{slug}(slug=${a.slug})}">
            <img th:src="${a.imageUrl} ?: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=200&auto=format&fit=crop'"
                 th:alt="${a.title}"/>
          </a>
          <h5><a th:href="@{/article/{slug}(slug=${a.slug})}" th:text="${a.title}">Title</a></h5>
        </div>
      </div>
      <div class="sidebar-widget">
        <h4>Topics</h4>
        <a th:each="cat : ${categories}"
           th:href="@{/category/{slug}(slug=${cat.slug})}"
           class="sidebar-cat-link"
           th:text="${cat.name}">Category</a>
      </div>
    </aside>
  </div>
</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
