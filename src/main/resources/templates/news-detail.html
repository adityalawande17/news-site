<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head(${article.title})}"></head>
  <body>
    <th:block
      th:replace="~{fragments :: header(${categories}, ${featured})}"
    ></th:block>

    <div class="container article-page">
      <div class="art-header">
        <!-- Breaking badge (only if marked as breaking) -->
        <div
          th:if="${article.breaking}"
          style="
            background: #cc0000;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 3px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
          "
        >
          &#9679; Breaking News
        </div>

        <!-- Category tag (if not breaking) -->
        <span
          class="cat-tag"
          th:unless="${article.breaking}"
          th:if="${article.category}"
          style="display: inline-block; margin-bottom: 10px"
          th:text="${article.category.name}"
          >Category</span
        >

        <h1 th:text="${article.title}">Title</h1>

        <!-- Source + byline bar -->
        <div class="art-byline">
          <span th:if="${article.newsSource}">
            Source: <strong th:text="${article.newsSource}">Source</strong>
            &nbsp;&middot;&nbsp;
          </span>
          By
          <strong th:text="${article.authorName} ?: 'Editorial Team'"
            >Author</strong
          >
          &nbsp;&middot;&nbsp;
          <span
            th:text="${#temporals.format(article.createdAt, 'MMMM dd, yyyy · hh:mm a')}"
          >
            Date
          </span>
          &nbsp;&middot;&nbsp;
          <span th:text="${article.views} + ' views'">Views</span>
        </div>
      </div>

      <!-- Cover image -->
      <img
        class="art-cover"
        th:if="${article.imageUrl}"
        th:src="${article.imageUrl}"
        th:alt="${article.title}"
      />

      <!-- Two-column layout -->
      <div class="article-layout">
        <div>
          <div class="article-body">
            <p class="summary-quote" th:text="${article.summary}">Summary</p>
            <div th:utext="${article.content}">Content</div>
          </div>

          <!-- Share bar -->
          <div
            style="
              border-top: 1px solid var(--border);
              margin-top: 30px;
              padding-top: 16px;
              display: flex;
              gap: 10px;
              align-items: center;
            "
          >
            <span style="font-size: 13px; font-weight: 700; color: var(--mid)"
              >Share:</span
            >
            <a
              href="#"
              style="
                background: #1da1f2;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              &#120143; Twitter
            </a>
            <a
              href="#"
              style="
                background: #0077b5;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              LinkedIn
            </a>
            <a
              href="#"
              style="
                background: #25d366;
                color: #fff;
                font-size: 12px;
                padding: 5px 14px;
                border-radius: 3px;
                font-weight: 700;
              "
            >
              WhatsApp
            </a>
          </div>
        </div>

        <!-- Sidebar -->
        <aside>
          <div class="sidebar-widget">
            <h4>Latest News</h4>
            <div
              class="sidebar-art"
              th:each="a : ${latest}"
              th:if="${a.slug != article.slug}"
            >
              <img
                th:src="${a.imageUrl}
               ?: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=200'"
                loading="lazy"
                style="
                  width: 70px;
                  height: 52px;
                  object-fit: cover;
                  flex-shrink: 0;
                "
              />
              <h5>
                <a
                  th:href="@{/article/{slug}(slug=${a.slug})}"
                  th:text="${a.title}"
                  >Title</a
                >
              </h5>
            </div>
          </div>

          <div class="sidebar-widget">
            <h4>Topics</h4>
            <a
              th:each="cat : ${categories}"
              th:href="@{/category/{slug}(slug=${cat.slug})}"
              class="sidebar-cat-link"
              th:text="${cat.name}"
              >Category</a
            >
          </div>
        </aside>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
