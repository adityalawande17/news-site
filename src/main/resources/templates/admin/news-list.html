<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('News')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('news')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>News</h1>
          <a th:href="@{/admin/news/new}" class="btn btn-primary"
            >+ New Article</a
          >
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Source</th>
                <th>Breaking</th>
                <th>Category</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="n : ${newsList}">
                <td><strong th:text="${n.title}">Title</strong></td>
                <td th:text="${n.newsSource} ?: '—'">Source</td>
                <td>
                  <span
                    th:if="${n.breaking}"
                    style="
                      background: #cc0000;
                      color: #fff;
                      padding: 2px 8px;
                      border-radius: 3px;
                      font-size: 11px;
                      font-weight: 700;
                    "
                  >
                    Breaking
                  </span>
                  <span
                    th:unless="${n.breaking}"
                    style="color: #aaa; font-size: 12px"
                    >—</span
                  >
                </td>
                <td th:text="${n.category?.name} ?: '—'">Cat</td>
                <td>
                  <span class="badge published" th:if="${n.published}"
                    >Published</span
                  >
                  <span class="badge draft" th:unless="${n.published}"
                    >Draft</span
                  >
                </td>
                <td th:text="${n.views}">0</td>
                <td th:text="${#temporals.format(n.createdAt, 'MMM dd')}">
                  Date
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/article/{slug}(slug=${n.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/news/edit/{id}(id=${n.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/news/delete/{id}(id=${n.id})}"
                    onsubmit="return confirm('Delete this article?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${newsList.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No news articles yet.
            <a th:href="@{/admin/news/new}" style="color: #c0392b"
              >Add the first one.</a
            >
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
