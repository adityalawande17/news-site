<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('News')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('news')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>News</h1>
          <a th:href="@{/admin/news/new}" class="btn btn-primary"
            >+ New Article</a
          >
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <form
            method="get"
            th:action="@{/admin/news}"
            style="
              display: flex;
              flex-wrap: wrap;
              gap: 10px;
              align-items: center;
              margin-bottom: 16px;
            "
          >
            <input
              type="text"
              name="q"
              placeholder="Search by title&hellip;"
              th:value="${q}"
              style="
                flex: 1;
                min-width: 180px;
                padding: 8px 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
              "
            />
            <select name="categoryId" onchange="this.form.submit()">
              <option value="">All Categories</option>
              <option
                th:each="c : ${categories}"
                th:value="${c.id}"
                th:text="${c.name}"
                th:selected="${c.id == selectedCategoryId}"
              ></option>
            </select>
            <button type="submit" class="btn btn-secondary btn-sm">
              Search
            </button>
            <a
              th:href="@{/admin/news}"
              class="btn btn-secondary btn-sm"
              th:if="${q != null or selectedCategoryId != null}"
              >Clear</a
            >
          </form>

          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Source</th>
                <th>Breaking</th>
                <th>Category</th>
                <th>Status</th>
                <th>Views</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="n : ${newsList}">
                <td><strong th:text="${n.title}">Title</strong></td>
                <td th:text="${n.newsSource} ?: '—'">Source</td>
                <td>
                  <span
                    th:if="${n.breaking}"
                    style="
                      background: #cc0000;
                      color: #fff;
                      padding: 2px 8px;
                      border-radius: 3px;
                      font-size: 11px;
                      font-weight: 700;
                    "
                  >
                    Breaking
                  </span>
                  <span
                    th:unless="${n.breaking}"
                    style="color: #aaa; font-size: 12px"
                    >—</span
                  >
                </td>
                <td th:text="${n.category?.name} ?: '—'">Cat</td>
                <td>
                  <span class="badge published" th:if="${n.published}"
                    >Published</span
                  >
                  <span class="badge draft" th:unless="${n.published}"
                    >Draft</span
                  >
                </td>
                <td th:text="${n.views}">0</td>
                <td th:text="${#temporals.format(n.createdAt, 'MMM dd')}">
                  Date
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/article/{slug}(slug=${n.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/news/edit/{id}(id=${n.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/news/delete/{id}(id=${n.id})}"
                    onsubmit="return confirm('Delete this article?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${newsList.isEmpty() and q == null and selectedCategoryId == null}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No news articles yet.
            <a th:href="@{/admin/news/new}" style="color: #c0392b"
              >Add the first one.</a
            >
          </p>
          <p
            th:if="${newsList.isEmpty() and (q != null or selectedCategoryId != null)}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No news articles match your search/filters.
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
