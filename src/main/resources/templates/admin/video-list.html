<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Videos')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('videos')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Videos</h1>
          <a th:href="@{/admin/videos/new}" class="btn btn-primary"
            >+ New Video</a
          >
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Thumbnail</th>
                <th>Title</th>
                <th>Host</th>
                <th>Duration</th>
                <th>Category</th>
                <th>Status</th>
                <th>Views</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="v : ${videos}">
                <td>
                  <img
                    th:if="${v.thumbnailUrl}"
                    th:src="${v.thumbnailUrl}"
                    style="
                      width: 80px;
                      height: 50px;
                      object-fit: cover;
                      border-radius: 4px;
                    "
                  />
                  <div
                    th:unless="${v.thumbnailUrl}"
                    style="
                      width: 80px;
                      height: 50px;
                      background: #eee;
                      border-radius: 4px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 18px;
                    "
                  >
                    &#9654;
                  </div>
                </td>
                <td><strong th:text="${v.title}">Title</strong></td>
                <td th:text="${v.host} ?: '—'">Host</td>
                <td th:text="${v.duration} ?: '—'">Duration</td>
                <td th:text="${v.category?.name} ?: '—'">Cat</td>
                <td>
                  <span class="badge published" th:if="${v.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${v.published}">
                    Draft
                  </span>
                </td>
                <td th:text="${v.views}">0</td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/video/{slug}(slug=${v.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/videos/edit/{id}(id=${v.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/videos/delete/{id}(id=${v.id})}"
                    onsubmit="return confirm('Delete this video?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${videos.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No videos yet.
            <a th:href="@{/admin/videos/new}" style="color: #c0392b">
              Add the first one.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
