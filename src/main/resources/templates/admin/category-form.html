<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Category' : 'New Category')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-fragments :: sidebar('categories')}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1 th:text="${isEdit} ? 'Edit Category' : 'New Category'">Category</h1>
            <a th:href="@{/admin/categories}" class="btn btn-secondary">&larr; Back to Categories</a>
        </div>

        <div class="admin-card" style="max-width: 560px;">
            <form method="post" th:action="@{/admin/categories/save}" th:object="${category}">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label>Category Name <span style="color:#c0392b">*</span></label>
                    <input type="text" th:field="*{name}" placeholder="e.g. Technology" required/>
                    <span style="color:#c0392b; font-size:12.5px;" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</span>
                </div>

                <div class="form-group">
                    <label>Slug <span style="color:#999; font-weight:400;">(auto-generated if empty)</span></label>
                    <input type="text" th:field="*{slug}" placeholder="e.g. technology"/>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3" placeholder="Short description of this category..."></textarea>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Category' : 'Create Category'">Save</button>
                <a th:href="@{/admin/categories}" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
            </form>
        </div>
    </main>
</div>
</body>
</html>
