<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Companies')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('companies')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Companies</h1>
          <a th:href="@{/admin/companies/new}" class="btn btn-primary">
            + New Company
          </a>
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Logo</th>
                <th>Name</th>
                <th>Sector</th>
                <th>HQ</th>
                <th>CEO</th>
                <th>Featured</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="co : ${companies}">
                <td>
                  <img
                    th:if="${co.logoUrl}"
                    th:src="${co.logoUrl}"
                    style="
                      width: 40px;
                      height: 40px;
                      object-fit: contain;
                      border: 1px solid #eee;
                      border-radius: 4px;
                      padding: 3px;
                    "
                  />
                  <div
                    th:unless="${co.logoUrl}"
                    style="
                      width: 40px;
                      height: 40px;
                      background: #eee;
                      border-radius: 4px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 16px;
                    "
                  >
                    &#127970;
                  </div>
                </td>
                <td>
                  <strong th:text="${co.name}">Name</strong>
                  <div
                    style="font-size: 12px; color: #888"
                    th:text="${co.tagline}"
                  >
                    Tagline
                  </div>
                </td>
                <td th:text="${co.sector} ?: '—'">Sector</td>
                <td th:text="${co.headquarters} ?: '—'">HQ</td>
                <td th:text="${co.ceoName} ?: '—'">CEO</td>
                <td>
                  <span
                    th:if="${co.featured}"
                    style="color: #1a7a3a; font-weight: 700; font-size: 12px"
                  >
                    Yes
                  </span>
                  <span
                    th:unless="${co.featured}"
                    style="color: #aaa; font-size: 12px"
                    >No</span
                  >
                </td>
                <td>
                  <span class="badge published" th:if="${co.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${co.published}">
                    Draft
                  </span>
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/company/{slug}(slug=${co.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/companies/edit/{id}(id=${co.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/companies/delete/{id}(id=${co.id})}"
                    onsubmit="return confirm('Delete this company?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${companies.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No companies yet.
            <a th:href="@{/admin/companies/new}" style="color: #c0392b">
              Add the first one.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
