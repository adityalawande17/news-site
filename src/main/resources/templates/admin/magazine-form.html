<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Issue' : 'New Issue')}"
  ></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('magazine')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1 th:text="${isEdit} ? 'Edit Issue' : 'New Issue'">Issue</h1>
          <a th:href="@{/admin/magazine}" class="btn btn-secondary">
            &larr; Back to Magazine
          </a>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">
          Error
        </div>

        <div class="admin-card">
          <form
            method="post"
            th:action="@{/admin/magazine/save}"
            enctype="multipart/form-data"
            th:object="${magazine}"
          >
            <input type="hidden" th:field="*{id}" />

            <div class="form-row">
              <div class="form-group">
                <label
                  >Issue Title <span style="color: #c0392b">*</span>
                  <span style="color: #999; font-weight: 400">
                    e.g. "The AI Issue"
                  </span>
                </label>
                <input
                  type="text"
                  th:field="*{title}"
                  placeholder="Issue title..."
                  required
                />
                <span
                  style="color: #c0392b; font-size: 12.5px"
                  th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}"
                  >Error</span
                >
              </div>
              <div class="form-group">
                <label
                  >URL Slug
                  <span style="color: #999; font-weight: 400">
                    (auto-generated if empty)
                  </span>
                </label>
                <input
                  type="text"
                  th:field="*{slug}"
                  placeholder="the-ai-issue-july-2026"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Issue Number</label>
                <input
                  type="number"
                  th:field="*{issueNumber}"
                  placeholder="e.g. 18"
                  min="1"
                />
              </div>
              <div class="form-group">
                <label>Region <span style="color: #c0392b">*</span></label>
                <select th:field="*{region}">
                  <option value="">— Select Region —</option>
                  <option
                    th:each="reg : ${regions}"
                    th:value="${reg}"
                    th:text="${reg.label}"
                    th:selected="${magazine.region == reg}"
                  >
                    Region
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label>Month</label>
                <select th:field="*{month}">
                  <option value="">— Select Month —</option>
                  <option value="January">January</option>
                  <option value="February">February</option>
                  <option value="March">March</option>
                  <option value="April">April</option>
                  <option value="May">May</option>
                  <option value="June">June</option>
                  <option value="July">July</option>
                  <option value="August">August</option>
                  <option value="September">September</option>
                  <option value="October">October</option>
                  <option value="November">November</option>
                  <option value="December">December</option>
                </select>
              </div>
              <div class="form-group">
                <label>Year</label>
                <input
                  type="number"
                  th:field="*{year}"
                  placeholder="2026"
                  min="2020"
                  max="2030"
                />
              </div>
            </div>

            <div class="form-group">
              <label
                >Description
                <span style="color: #999; font-weight: 400">max 500 chars</span>
              </label>
              <textarea
                th:field="*{description}"
                rows="3"
                maxlength="500"
                placeholder="What is this issue about?"
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Cover Image</label>
                <img
                  th:if="${magazine.coverImageUrl}"
                  th:src="${magazine.coverImageUrl}"
                  style="
                    width: 80px;
                    border-radius: 4px;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="coverImageFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 5px 0 0">
                  Recommended: Portrait ratio (e.g. 600x800px)
                </p>
              </div>
              <div class="form-group">
                <label
                  >PDF Download URL
                  <span style="color: #999; font-weight: 400">
                    — Google Drive, Dropbox, or direct link
                  </span>
                </label>
                <input
                  type="text"
                  th:field="*{pdfUrl}"
                  placeholder="https://drive.google.com/..."
                />
                <p style="font-size: 12px; color: #888; margin: 5px 0 0">
                  Leave blank if no PDF is available yet.
                </p>
              </div>
            </div>

            <!-- Article picker -->
            <div class="form-group">
              <label
                >Featured Articles in This Issue
                <span style="color: #999; font-weight: 400">
                  — hold Ctrl / Cmd to select multiple
                </span>
              </label>
              <select name="articleIds" multiple style="height: 180px">
                <option
                  th:each="art : ${articles}"
                  th:value="${art.id}"
                  th:text="${art.title}"
                  th:selected="${magazine.featuredArticles != null
                                  and magazine.featuredArticles.contains(art)}"
                >
                  Article
                </option>
              </select>
              <p style="font-size: 12px; color: #888; margin: 5px 0 0">
                Selected articles appear on the magazine issue page.
              </p>
            </div>

            <div class="checkbox-row" style="margin-bottom: 24px">
              <label>
                <input type="checkbox" th:field="*{published}" />
                Published (visible on site)
              </label>
            </div>

            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button
              type="submit"
              class="btn btn-primary"
              th:text="${isEdit} ? 'Update Issue' : 'Publish Issue'"
            >
              Save
            </button>
            <a
              th:href="@{/admin/magazine}"
              class="btn btn-secondary"
              style="margin-left: 8px"
              >Cancel</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
