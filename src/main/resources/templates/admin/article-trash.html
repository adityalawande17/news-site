<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/admin-fragments :: head('Article Trash')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{admin/admin-fragments :: sidebar('articles')}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1>Trash</h1>
            <a th:href="@{/admin/articles}" class="btn btn-secondary">&larr; Back to Articles</a>
        </div>

        <div class="alert alert-success" th:if="${success}" th:text="${success}">OK</div>

        <p style="color:#777; font-size:13px; margin-top:-8px;">
            Trashed articles are hidden from the public site and from the Articles list, but are not gone —
            restore them here, or delete them forever.
        </p>

        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Trashed On</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="art : ${articles}">
                        <td><strong th:text="${art.title}">Title</strong></td>
                        <td th:text="${art.articleType}">Type</td>
                        <td th:text="${art.category?.name} ?: '—'">Cat</td>
                        <td th:text="${#temporals.format(art.updatedAt, 'MMM dd, yyyy')}">Date</td>
                        <td style="display:flex; gap:6px;">
                            <form method="post" th:action="@{/admin/articles/restore/{id}(id=${art.id})}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-secondary btn-sm">Restore</button>
                            </form>
                            <form method="post" th:action="@{/admin/articles/delete-forever/{id}(id=${art.id})}"
                                  onsubmit="return confirm('Permanently delete this article? This cannot be undone.')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger btn-sm">Delete Forever</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${articles.isEmpty()}" style="text-align:center; color:#888; padding: 30px 0;">
                Trash is empty.
            </p>

            <div th:if="${articles.totalPages > 1}"
                 style="display:flex; justify-content:center; align-items:center; gap:14px; margin-top:18px;">
                <a th:if="${articles.number > 0}"
                   th:href="@{/admin/articles/trash(page=${articles.number - 1})}"
                   class="btn btn-secondary btn-sm">&larr; Prev</a>
                <span style="font-size:13px; color:#777;"
                      th:text="${articles.number + 1} + ' of ' + ${articles.totalPages}">1 of 1</span>
                <a th:if="${articles.number + 1 < articles.totalPages}"
                   th:href="@{/admin/articles/trash(page=${articles.number + 1})}"
                   class="btn btn-secondary btn-sm">Next &rarr;</a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
