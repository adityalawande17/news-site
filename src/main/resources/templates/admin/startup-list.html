<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{admin/admin-fragments :: head('Startups')}"></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('startups')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1>Startups</h1>
          <a th:href="@{/admin/startups/new}" class="btn btn-primary">
            + New Startup
          </a>
        </div>

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        >
          OK
        </div>

        <div class="admin-card">
          <table>
            <thead>
              <tr>
                <th>Logo</th>
                <th>Name</th>
                <th>Founder</th>
                <th>Sector</th>
                <th>Stage</th>
                <th>Raised</th>
                <th>City</th>
                <th>Featured</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="st : ${startups}">
                <td>
                  <img
                    th:if="${st.logoUrl}"
                    th:src="${st.logoUrl}"
                    style="
                      width: 36px;
                      height: 36px;
                      object-fit: contain;
                      border: 1px solid #eee;
                      border-radius: 6px;
                      padding: 3px;
                    "
                  />
                  <div
                    th:unless="${st.logoUrl}"
                    style="
                      width: 36px;
                      height: 36px;
                      background: #eee;
                      border-radius: 6px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 14px;
                    "
                  >
                    &#128640;
                  </div>
                </td>
                <td>
                  <strong th:text="${st.name}">Name</strong>
                  <div
                    style="
                      font-size: 11px;
                      color: #888;
                      max-width: 160px;
                      overflow: hidden;
                      text-overflow: ellipsis;
                      white-space: nowrap;
                    "
                    th:text="${st.pitch}"
                  >
                    Pitch
                  </div>
                </td>
                <td th:text="${st.founderName} ?: '—'">Founder</td>
                <td th:text="${st.sector} ?: '—'">Sector</td>
                <td>
                  <span
                    th:if="${st.fundingStage != null}"
                    style="
                      font-size: 11px;
                      font-weight: 700;
                      padding: 2px 8px;
                      border-radius: 10px;
                      background: #e3f2fd;
                      color: #1565c0;
                    "
                    th:text="${st.fundingStage.label}"
                    >Stage</span
                  >
                  <span
                    th:unless="${st.fundingStage != null}"
                    style="color: #aaa; font-size: 12px"
                    >—</span
                  >
                </td>
                <td th:text="${st.amountRaised} ?: '—'">Amount</td>
                <td th:text="${st.city} ?: '—'">City</td>
                <td>
                  <span
                    th:if="${st.featured}"
                    style="color: #1a7a3a; font-weight: 700; font-size: 12px"
                  >
                    Yes
                  </span>
                  <span
                    th:unless="${st.featured}"
                    style="color: #aaa; font-size: 12px"
                    >No</span
                  >
                </td>
                <td>
                  <span class="badge published" th:if="${st.published}">
                    Published
                  </span>
                  <span class="badge draft" th:unless="${st.published}">
                    Draft
                  </span>
                </td>
                <td style="display: flex; gap: 6px">
                  <a
                    th:href="@{/startup/{slug}(slug=${st.slug})}"
                    class="btn btn-secondary btn-sm"
                    target="_blank"
                    >View</a
                  >
                  <a
                    th:href="@{/admin/startups/edit/{id}(id=${st.id})}"
                    class="btn btn-secondary btn-sm"
                    >Edit</a
                  >
                  <form
                    method="post"
                    th:action="@{/admin/startups/delete/{id}(id=${st.id})}"
                    onsubmit="return confirm('Delete this startup?');"
                  >
                    <input
                      type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}"
                    />
                    <button type="submit" class="btn btn-danger btn-sm">
                      Del
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>

          <p
            th:if="${startups.isEmpty()}"
            style="text-align: center; color: #888; padding: 40px 0"
          >
            No startups yet.
            <a th:href="@{/admin/startups/new}" style="color: #c0392b">
              Add the first one.
            </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
