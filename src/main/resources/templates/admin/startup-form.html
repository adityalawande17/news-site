<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{admin/admin-fragments :: head(${isEdit} ? 'Edit Startup' : 'New Startup')}"
  ></head>
  <body>
    <div class="admin-layout">
      <div th:replace="~{admin/admin-fragments :: sidebar('startups')}"></div>

      <main class="admin-main">
        <div class="admin-topbar">
          <h1 th:text="${isEdit} ? 'Edit Startup' : 'New Startup'">Startup</h1>
          <a th:href="@{/admin/startups}" class="btn btn-secondary">
            &larr; Back to Startups
          </a>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}">
          Error
        </div>

        <div class="admin-card">
          <form
            method="post"
            th:action="@{/admin/startups/save}"
            enctype="multipart/form-data"
            th:object="${startup}"
          >
            <input type="hidden" th:field="*{id}" />

            <!-- Basic info -->
            <div class="form-row">
              <div class="form-group">
                <label
                  >Startup Name <span style="color: #c0392b">*</span></label
                >
                <input
                  type="text"
                  th:field="*{name}"
                  placeholder="e.g. PayLocal"
                  required
                />
              </div>
              <div class="form-group">
                <label
                  >URL Slug
                  <span style="color: #999; font-weight: 400">
                    (auto-generated if empty)
                  </span>
                </label>
                <input type="text" th:field="*{slug}" placeholder="paylocal" />
              </div>
            </div>

            <div class="form-group">
              <label
                >One-Line Pitch
                <span style="color: #999; font-weight: 400">max 300 chars</span>
              </label>
              <input
                type="text"
                th:field="*{pitch}"
                maxlength="300"
                placeholder="e.g. UPI-native payments for India's 80M kirana stores"
              />
            </div>

            <div class="form-group">
              <label>Full Description</label>
              <textarea
                th:field="*{description}"
                rows="5"
                placeholder="Detailed description of the startup..."
              ></textarea>
            </div>

            <!-- Sector + Location -->
            <div class="form-row">
              <div class="form-group">
                <label>Sector</label>
                <input
                  type="text"
                  th:field="*{sector}"
                  placeholder="e.g. Fintech, AgriTech, HealthTech"
                />
              </div>
              <div class="form-group">
                <label>Founding Year</label>
                <input
                  type="number"
                  th:field="*{foundingYear}"
                  placeholder="e.g. 2023"
                  min="1990"
                  max="2099"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input
                  type="text"
                  th:field="*{city}"
                  placeholder="e.g. Bengaluru"
                />
              </div>
              <div class="form-group">
                <label>Country</label>
                <input
                  type="text"
                  th:field="*{country}"
                  placeholder="e.g. India"
                />
              </div>
            </div>

            <!-- Funding -->
            <div class="form-row">
              <div class="form-group">
                <label>Funding Stage</label>
                <select th:field="*{fundingStage}">
                  <option value="">— Select Stage —</option>
                  <option
                    th:each="stage : ${fundingStages}"
                    th:value="${stage}"
                    th:text="${stage.label}"
                    th:selected="${startup.fundingStage == stage}"
                  >
                    Stage
                  </option>
                </select>
              </div>
              <div class="form-group">
                <label>Amount Raised</label>
                <input
                  type="text"
                  th:field="*{amountRaised}"
                  placeholder="e.g. $8M or Rs. 50 Cr"
                />
              </div>
            </div>

            <!-- Founder -->
            <div
              style="
                border: 1px solid #e0e8f0;
                background: #f5f8ff;
                border-radius: 6px;
                padding: 20px;
                margin-bottom: 18px;
              "
            >
              <h4
                style="
                  margin: 0 0 16px;
                  font-size: 15px;
                  color: #1a4a8a;
                  border-bottom: 1px solid #d0e0f0;
                  padding-bottom: 10px;
                "
              >
                &#128100; Founder Details
              </h4>
              <div class="form-row">
                <div class="form-group">
                  <label>Founder Name</label>
                  <input
                    type="text"
                    th:field="*{founderName}"
                    placeholder="e.g. Rahul Sharma"
                  />
                </div>
                <div class="form-group">
                  <label>Founder Title</label>
                  <input
                    type="text"
                    th:field="*{founderTitle}"
                    placeholder="e.g. CEO &amp; Co-Founder"
                  />
                </div>
              </div>
              <div class="form-group">
                <label>Founder Photo</label>
                <img
                  th:if="${startup.founderPhoto}"
                  th:src="${startup.founderPhoto}"
                  style="
                    width: 60px;
                    height: 60px;
                    border-radius: 50%;
                    object-fit: cover;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="founderPhotoFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                  Displayed as a circular photo on the profile page.
                </p>
              </div>
            </div>

            <!-- Links -->
            <div class="form-row">
              <div class="form-group">
                <label>Website URL</label>
                <input
                  type="text"
                  th:field="*{websiteUrl}"
                  placeholder="https://paylocal.in"
                />
              </div>
              <div class="form-group">
                <label>LinkedIn URL</label>
                <input
                  type="text"
                  th:field="*{linkedinUrl}"
                  placeholder="https://linkedin.com/company/paylocal"
                />
              </div>
            </div>

            <div class="form-group">
              <label>Twitter / X URL</label>
              <input
                type="text"
                th:field="*{twitterUrl}"
                placeholder="https://twitter.com/paylocal"
              />
            </div>

            <!-- Images -->
            <div class="form-row">
              <div class="form-group">
                <label>Logo</label>
                <img
                  th:if="${startup.logoUrl}"
                  th:src="${startup.logoUrl}"
                  style="
                    width: 60px;
                    height: 60px;
                    object-fit: contain;
                    border: 1px solid #eee;
                    border-radius: 6px;
                    padding: 4px;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="logoFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                  Square PNG with transparent background recommended.
                </p>
              </div>
              <div class="form-group">
                <label>Cover Image</label>
                <img
                  th:if="${startup.coverImageUrl}"
                  th:src="${startup.coverImageUrl}"
                  style="
                    width: 120px;
                    border-radius: 4px;
                    margin-bottom: 8px;
                    display: block;
                  "
                />
                <input type="file" name="coverFile" accept="image/*" />
                <p style="font-size: 12px; color: #888; margin: 4px 0 0">
                  Banner shown at the top of the startup profile.
                </p>
              </div>
            </div>

            <div class="checkbox-row" style="margin-bottom: 24px">
              <label>
                <input type="checkbox" th:field="*{published}" />
                Published (visible on site)
              </label>
              <label>
                <input type="checkbox" th:field="*{featured}" />
                Featured (shown on homepage)
              </label>
            </div>

            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button
              type="submit"
              class="btn btn-primary"
              th:text="${isEdit} ? 'Update Startup' : 'Add Startup'"
            >
              Save
            </button>
            <a
              th:href="@{/admin/startups}"
              class="btn btn-secondary"
              style="margin-left: 8px"
              >Cancel</a
            >
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
