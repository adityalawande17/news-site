<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block th:fragment="head(title)">
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title th:text="${title} + ' | Decisions Insights Admin'">
        Decisions Insights Admin
      </title>
      <link rel="stylesheet" th:href="@{/css/admin.css}" />
    </th:block>

    <aside th:fragment="sidebar(active)" class="admin-sidebar">
      <div class="brand">Decisions Insights</div>

      <a
        th:href="@{/admin/dashboard}"
        th:classappend="${active == 'dashboard'} ? ' active' : ''"
      >
        Dashboard
      </a>

      <div class="sidebar-section-label">Content</div>

      <a
        th:href="@{/admin/articles}"
        th:classappend="${active == 'articles'} ? ' active' : ''"
      >
        Articles
      </a>

      <a
        th:href="@{/admin/interviews}"
        th:classappend="${active == 'interviews'} ? ' active' : ''"
      >
        Interviews
      </a>

      <a
        th:href="@{/admin/news}"
        th:classappend="${active == 'news'} ? ' active' : ''"
      >
        News
      </a>
      <a
        th:href="@{/admin/case-studies}"
        th:classappend="${active == 'case-studies'} ? ' active' : ''"
      >
        Case Studies
      </a>
      <a
        th:href="@{/admin/press-releases}"
        th:classappend="${active == 'press-releases'} ? ' active' : ''"
      >
        Press Releases
      </a>
      <a
        th:href="@{/admin/videos}"
        th:classappend="${active == 'videos'} ? ' active' : ''"
      >
        Videos
      </a>

      <a
        th:href="@{/admin/magazine}"
        th:classappend="${active == 'magazine'} ? ' active' : ''"
      >
        Magazine
      </a>
      <a
        th:href="@{/admin/companies}"
        th:classappend="${active == 'companies'} ? ' active' : ''"
      >
        Companies
      </a>
      <a
        th:href="@{/admin/startups}"
        th:classappend="${active == 'startups'} ? ' active' : ''"
      >
        Startups
      </a>

      <div class="sidebar-section-label">Site</div>

      <a
        th:href="@{/admin/categories}"
        th:classappend="${active == 'categories'} ? ' active' : ''"
      >
        Categories
      </a>

      <a th:href="@{/}" target="_blank"> View Site </a>

      <form method="post" th:action="@{/admin/logout}" style="margin-top: auto">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <button type="submit">&#x21B6; Logout</button>
      </form>
    </aside>
  </body>
</html>
