<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Companies')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <th:block
      th:replace="~{fragments :: pageHero('Companies', 'A growing directory of the businesses shaping today\'s economy — in-depth profiles covering sector, leadership, and the story behind what they\'ve built.')}"
    ></th:block>

    <div class="container page-section">
      <!-- Sector filter dropdown -->
      <form
        th:if="${!sectors.isEmpty()}"
        th:action="@{/companies}"
        method="get"
        style="
          display: flex;
          align-items: center;
          gap: 8px;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <label
          for="sectorFilter"
          style="
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
          "
          >Sector</label
        >
        <select
          id="sectorFilter"
          name="sector"
          onchange="this.form.submit()"
          style="
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid var(--border);
            background: #fff;
            color: #333;
            cursor: pointer;
          "
        >
          <option value="" th:selected="${activeSector == null}">
            All Sectors
          </option>
          <option
            th:each="sec : ${sectors}"
            th:value="${sec}"
            th:text="${sec}"
            th:selected="${activeSector == sec}"
          >
            Sector
          </option>
        </select>
      </form>

      <!-- Company grid -->
      <div class="blog-grid" th:if="${!companies.content.isEmpty()}">
        <div
          th:each="co : ${companies.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--white);
            transition: box-shadow 0.2s;
          "
          onmouseover="this.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <!-- Cover image or gradient header -->
          <div style="height: 100px; background: #111; position: relative">
            <img
              th:if="${co.coverImageUrl}"
              th:src="${co.coverImageUrl}"
              loading="lazy"
              style="width: 100%; height: 100%; object-fit: cover; opacity: 0.7"
            />
            <!-- Logo -->
            <div style="position: absolute; bottom: -24px; left: 16px">
              <img
                th:if="${co.logoUrl}"
                th:src="${co.logoUrl}"
                loading="lazy"
                style="
                  width: 48px;
                  height: 48px;
                  object-fit: contain;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  padding: 4px;
                "
              />
              <div
                th:unless="${co.logoUrl}"
                style="
                  width: 48px;
                  height: 48px;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 20px;
                "
              >
                &#127970;
              </div>
            </div>
          </div>

          <div style="padding: 32px 16px 16px">
            <!-- Sector tag -->
            <div
              th:if="${co.sector}"
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
              "
              th:text="${co.sector}"
            >
              Sector
            </div>

            <!-- Name -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
              "
            >
              <a
                th:href="@{/company/{slug}(slug=${co.slug})}"
                th:text="${co.name}"
                >Name</a
              >
            </h3>

            <!-- Tagline -->
            <p
              th:if="${co.tagline}"
              style="font-size: 13px; color: var(--muted); margin-bottom: 12px"
              th:text="${co.tagline}"
            >
              Tagline
            </p>

            <!-- Stats row -->
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-bottom: 14px;
                padding: 10px;
                background: var(--light-bg);
                border-radius: 6px;
              "
            >
              <div th:if="${co.foundingYear}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Founded
                </div>
                <div
                  style="font-size: 14px; font-weight: 700"
                  th:text="${co.foundingYear}"
                >
                  Year
                </div>
              </div>
              <div th:if="${co.employeeCount}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Employees
                </div>
                <div
                  style="font-size: 14px; font-weight: 700"
                  th:text="${co.employeeCount}"
                >
                  Count
                </div>
              </div>
              <div th:if="${co.headquarters}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  HQ
                </div>
                <div
                  style="font-size: 13px; font-weight: 700"
                  th:text="${co.headquarters}"
                >
                  HQ
                </div>
              </div>
              <div th:if="${co.annualRevenue}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Revenue
                </div>
                <div
                  style="font-size: 13px; font-weight: 700"
                  th:text="${co.annualRevenue}"
                >
                  Revenue
                </div>
              </div>
            </div>

            <a
              th:href="@{/company/{slug}(slug=${co.slug})}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
            >
              View Profile &rarr;
            </a>
          </div>
        </div>
      </div>

      <p
        th:if="${companies.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No companies published yet.
      </p>

      <!-- Pagination — preserves sector param (Thymeleaf omits it when null) -->
      <div class="pagination" th:if="${companies.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/companies(sector=${activeSector}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${companies.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < companies.totalPages}"
          th:href="@{/companies(sector=${activeSector}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
