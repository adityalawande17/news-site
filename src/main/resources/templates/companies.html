<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('Companies')}"></head>
  <body>
    <th:block th:replace="~{fragments :: header(${categories}, ${featured})}">
    </th:block>

    <div class="container page-section">
      <div class="section-header">
        <h2>Company Profiles</h2>
      </div>
      <p
        style="
          color: var(--muted);
          font-size: 15px;
          margin-top: -10px;
          margin-bottom: 24px;
        "
      >
        In-depth profiles of the companies shaping business today.
      </p>

      <!-- Sector filter pills -->
      <div
        th:if="${!sectors.isEmpty()}"
        style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px"
      >
        <a
          th:href="@{/companies}"
          th:style="${activeSector == null}
                 ? 'padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none;'
                 : 'padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid var(--border); text-decoration:none;'"
        >
          All Sectors
        </a>
        <a
          th:each="sec : ${sectors}"
          th:href="@{/companies(sector=${sec})}"
          th:text="${sec}"
          th:style="${activeSector == sec}
                 ? 'padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; background:#111; color:#fff; border:1px solid #111; text-decoration:none;'
                 : 'padding:6px 16px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; color:#333; border:1px solid var(--border); text-decoration:none;'"
        >
          Sector
        </a>
      </div>

      <!-- Company grid -->
      <div class="blog-grid" th:if="${!companies.content.isEmpty()}">
        <div
          th:each="co : ${companies.content}"
          style="
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: var(--white);
            transition: box-shadow 0.2s;
          "
          onmouseover="this.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <!-- Cover image or gradient header -->
          <div style="height: 100px; background: #111; position: relative">
            <img
              th:if="${co.coverImageUrl}"
              th:src="${co.coverImageUrl}"
              loading="lazy"
              style="width: 100%; height: 100%; object-fit: cover; opacity: 0.7"
            />
            <!-- Logo -->
            <div style="position: absolute; bottom: -24px; left: 16px">
              <img
                th:if="${co.logoUrl}"
                th:src="${co.logoUrl}"
                loading="lazy"
                style="
                  width: 48px;
                  height: 48px;
                  object-fit: contain;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  padding: 4px;
                "
              />
              <div
                th:unless="${co.logoUrl}"
                style="
                  width: 48px;
                  height: 48px;
                  background: #fff;
                  border: 2px solid var(--border);
                  border-radius: 8px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 20px;
                "
              >
                &#127970;
              </div>
            </div>
          </div>

          <div style="padding: 32px 16px 16px">
            <!-- Sector tag -->
            <div
              th:if="${co.sector}"
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
              "
              th:text="${co.sector}"
            >
              Sector
            </div>

            <!-- Name -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 4px;
              "
            >
              <a
                th:href="@{/company/{slug}(slug=${co.slug})}"
                th:text="${co.name}"
                >Name</a
              >
            </h3>

            <!-- Tagline -->
            <p
              th:if="${co.tagline}"
              style="font-size: 13px; color: var(--muted); margin-bottom: 12px"
              th:text="${co.tagline}"
            >
              Tagline
            </p>

            <!-- Stats row -->
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-bottom: 14px;
                padding: 10px;
                background: var(--light-bg);
                border-radius: 6px;
              "
            >
              <div th:if="${co.foundingYear}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Founded
                </div>
                <div
                  style="font-size: 14px; font-weight: 700"
                  th:text="${co.foundingYear}"
                >
                  Year
                </div>
              </div>
              <div th:if="${co.employeeCount}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Employees
                </div>
                <div
                  style="font-size: 14px; font-weight: 700"
                  th:text="${co.employeeCount}"
                >
                  Count
                </div>
              </div>
              <div th:if="${co.headquarters}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  HQ
                </div>
                <div
                  style="font-size: 13px; font-weight: 700"
                  th:text="${co.headquarters}"
                >
                  HQ
                </div>
              </div>
              <div th:if="${co.annualRevenue}">
                <div
                  style="
                    font-size: 10px;
                    color: var(--muted);
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                  "
                >
                  Revenue
                </div>
                <div
                  style="font-size: 13px; font-weight: 700"
                  th:text="${co.annualRevenue}"
                >
                  Revenue
                </div>
              </div>
            </div>

            <a
              th:href="@{/company/{slug}(slug=${co.slug})}"
              style="
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                text-transform: uppercase;
                letter-spacing: 0.4px;
              "
            >
              View Profile &rarr;
            </a>
          </div>
        </div>
      </div>

      <p
        th:if="${companies.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No companies published yet.
      </p>

      <div class="pagination" th:if="${companies.totalPages > 1}">
        <a
          th:if="${currentPage > 0 and activeSector != null}"
          th:href="@{/companies(sector=${activeSector}, page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <a
          th:if="${currentPage > 0 and activeSector == null}"
          th:href="@{/companies(page=${currentPage - 1})}"
        >
          &larr; Prev
        </a>
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${companies.totalPages}"
        >
          1
        </span>
        <a
          th:if="${currentPage + 1 < companies.totalPages and activeSector != null}"
          th:href="@{/companies(sector=${activeSector}, page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
        <a
          th:if="${currentPage + 1 < companies.totalPages and activeSector == null}"
          th:href="@{/companies(page=${currentPage + 1})}"
        >
          Next &rarr;
        </a>
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
