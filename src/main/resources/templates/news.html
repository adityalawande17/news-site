<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: head('News')}"></head>
  <body>
    <th:block
      th:replace="~{fragments :: header(${categories}, ${featured})}"
    ></th:block>

    <th:block
      th:replace="~{fragments :: pageHero('News', 'Breaking industry and market news as it happens — curated by our editorial team and updated throughout the day so you never miss what is moving business.')}"
    ></th:block>

    <div class="container page-section">
      <!-- Filter row: category + sort dropdowns (left) -->
      <form
        th:action="@{/news}"
        method="get"
        style="
          display: flex;
          align-items: center;
          gap: 20px;
          flex-wrap: wrap;
          margin-bottom: 28px;
          padding-bottom: 20px;
          border-bottom: 1px solid var(--border);
        "
      >
        <div style="display: flex; align-items: center; gap: 8px">
          <label
            for="categoryFilter"
            style="
              font-size: 13px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.4px;
            "
            >Category</label
          >
          <select
            id="categoryFilter"
            name="category"
            onchange="this.form.submit()"
            style="
              padding: 7px 14px;
              border-radius: 20px;
              font-size: 13px;
              font-weight: 700;
              border: 1px solid var(--border);
              background: #fff;
              color: #333;
              cursor: pointer;
            "
          >
            <option value="" th:selected="${activeCategory == null}">
              All Categories
            </option>
            <option
              th:each="cat : ${categories}"
              th:value="${cat.slug}"
              th:text="${cat.name}"
              th:selected="${activeCategory != null and activeCategory.slug == cat.slug}"
            >
              Category
            </option>
          </select>
        </div>

        <div style="display: flex; align-items: center; gap: 8px">
          <label
            for="sortFilter"
            style="
              font-size: 13px;
              font-weight: 700;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.4px;
            "
            >Sort</label
          >
          <select
            id="sortFilter"
            name="sort"
            onchange="this.form.submit()"
            style="
              padding: 7px 14px;
              border-radius: 20px;
              font-size: 13px;
              font-weight: 700;
              border: 1px solid var(--border);
              background: #fff;
              color: #333;
              cursor: pointer;
            "
          >
            <option value="desc" th:selected="${activeSort == 'desc'}">
              Latest First
            </option>
            <option value="asc" th:selected="${activeSort == 'asc'}">
              Oldest First
            </option>
          </select>
        </div>
      </form>

      <!-- News grid — 3 cols on desktop, 1 on mobile -->
      <div class="blog-grid" th:if="${!newsList.content.isEmpty()}">
        <div class="art-card-img" th:each="n : ${newsList.content}">
          <!-- Cover image -->
          <a th:href="@{/article/{slug}(slug=${n.slug})}">
            <img
              th:src="${n.imageUrl}
             ?: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&auto=format&fit=crop'"
              th:alt="${n.title}"
              loading="lazy"
              style="width: 100%; height: 200px; object-fit: cover"
            />
          </a>

          <div class="art-body" style="padding-top: 12px">
            <!-- Breaking badge + source -->
            <div
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 6px;
                flex-wrap: wrap;
              "
            >
              <span
                th:if="${n.breaking}"
                style="
                  background: #cc0000;
                  color: #fff;
                  font-size: 10px;
                  font-weight: 800;
                  padding: 2px 8px;
                  border-radius: 2px;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                "
              >
                Breaking
              </span>
              <span
                class="cat-tag"
                th:if="${n.category}"
                th:text="${n.category.name}"
                >Cat</span
              >
              <span
                th:if="${n.newsSource}"
                style="font-size: 11px; color: var(--muted); font-weight: 600"
                th:text="${n.newsSource}"
                >Source</span
              >
            </div>

            <!-- Title -->
            <h3
              style="
                font-family: var(--serif);
                font-size: 17px;
                line-height: 1.35;
                margin-bottom: 6px;
              "
            >
              <a
                th:href="@{/article/{slug}(slug=${n.slug})}"
                th:text="${n.title}"
                >Title</a
              >
            </h3>

            <!-- Summary -->
            <p
              style="font-size: 13px; color: var(--muted); margin-bottom: 8px"
              th:text="${#strings.abbreviate(n.summary, 110)}"
            >
              Summary
            </p>

            <!-- Date -->
            <span
              class="art-meta"
              th:text="${#temporals.format(n.createdAt, 'MMM dd, yyyy · hh:mm a')}"
            >
              Date
            </span>
          </div>
        </div>
      </div>

      <p
        th:if="${newsList.content.isEmpty()}"
        style="text-align: center; padding: 60px 0; color: var(--muted)"
      >
        No news articles published
        <span
          th:text="${activeCategory != null ? ' in ' + activeCategory.name : ''} + ' yet.'"
          >yet.</span
        >
      </p>

      <!-- Pagination — preserves category/sort params (Thymeleaf omits null ones) -->
      <div class="pagination" th:if="${newsList.totalPages > 1}">
        <a
          th:if="${currentPage > 0}"
          th:href="@{/news(category=${activeCategory != null ? activeCategory.slug : null}, sort=${activeSort}, page=${currentPage - 1})}"
          >&larr; Prev</a
        >
        <span
          class="current"
          th:text="${currentPage + 1} + ' of ' + ${newsList.totalPages}"
          >1</span
        >
        <a
          th:if="${currentPage + 1 < newsList.totalPages}"
          th:href="@{/news(category=${activeCategory != null ? activeCategory.slug : null}, sort=${activeSort}, page=${currentPage + 1})}"
          >Next &rarr;</a
        >
      </div>
    </div>

    <th:block th:replace="~{fragments :: footer}"></th:block>
  </body>
</html>
