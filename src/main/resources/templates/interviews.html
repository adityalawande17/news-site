<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Interviews')}"></head>
<body>
<th:block th:replace="~{fragments :: header(${categories}, ${featured})}"></th:block>

<div class="container page-section">

  <!-- Page heading -->
  <div class="section-header">
    <h2>Interviews</h2>
  </div>
  <p style="color:var(--muted); font-size:15px; margin-top:-10px; margin-bottom:28px;">
    In-depth conversations with the leaders building India's business future.
  </p>

  <!-- Interview card grid -->
  <div class="blog-grid" th:if="${!interviews.content.isEmpty()}">

    <div th:each="iv : ${interviews.content}"
         style="border:1px solid var(--border); border-radius:6px;
                overflow:hidden; background:var(--white);">

      <!-- Cover image -->
      <a th:href="@{/article/{slug}(slug=${iv.slug})}">
        <img th:src="${iv.imageUrl}
             ?: 'https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=600&auto=format&fit=crop'"
             th:alt="${iv.title}"
             loading="lazy"
             style="width:100%; height:200px; object-fit:cover; display:block;"/>
      </a>

      <div style="padding:14px;">

        <!-- Interviewee row -->
        <div th:if="${iv.intervieweeName != null}"
             style="display:flex; align-items:center; gap:12px; margin-bottom:12px;
                    padding-bottom:12px; border-bottom:1px solid var(--border);">

          <!-- Photo -->
          <img th:if="${iv.intervieweePhoto}"
               th:src="${iv.intervieweePhoto}"
               loading="lazy"
               style="width:46px; height:46px; border-radius:50%;
                      object-fit:cover; border:2px solid var(--border); flex-shrink:0;"/>

          <!-- Initials fallback -->
          <div th:unless="${iv.intervieweePhoto}"
               style="width:46px; height:46px; border-radius:50%; background:#111;
                      color:#fff; display:flex; align-items:center; justify-content:center;
                      font-size:16px; font-weight:700; flex-shrink:0;"
               th:text="${#strings.substring(iv.intervieweeName, 0, 1)}">A</div>

          <div>
            <div style="font-weight:700; font-size:14px; color:var(--black);"
                 th:text="${iv.intervieweeName}">Name</div>
            <div style="font-size:12px; color:var(--muted);"
                 th:text="${iv.intervieweeTitle}
                          + (${iv.intervieweeCompany} != null ? ', ' + ${iv.intervieweeCompany} : '')">
              Title, Company
            </div>
          </div>
        </div>

        <!-- Article title -->
        <h3 style="font-family:var(--serif); font-size:17px;
                   line-height:1.35; margin-bottom:8px;">
          <a th:href="@{/article/{slug}(slug=${iv.slug})}"
             th:text="${iv.title}">Title</a>
        </h3>

        <!-- Summary -->
        <p style="font-size:13px; color:var(--muted); margin-bottom:12px;"
           th:text="${#strings.abbreviate(iv.summary, 110)}">Summary</p>

        <!-- Footer: date + read link -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="art-meta"
                th:text="${#temporals.format(iv.createdAt, 'MMM dd, yyyy')}">Date</span>
          <a th:href="@{/article/{slug}(slug=${iv.slug})}"
             style="font-size:12px; font-weight:700; color:var(--red);
                    text-transform:uppercase; letter-spacing:0.4px;">
            Read Interview &rarr;
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div th:if="${interviews.content.isEmpty()}"
       style="text-align:center; padding:80px 0; color:var(--muted);">
    <p style="font-size:18px; margin-bottom:8px;">No interviews published yet.</p>
    <p>Check back soon.</p>
  </div>

  <!-- Pagination -->
  <div class="pagination" th:if="${interviews.totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="@{/interviews(page=${currentPage - 1})}">&larr; Prev</a>
    <span class="current"
          th:text="${currentPage + 1} + ' of ' + ${interviews.totalPages}">1 of 1</span>
    <a th:if="${currentPage + 1 < interviews.totalPages}"
       th:href="@{/interviews(page=${currentPage + 1})}">Next &rarr;</a>
  </div>

</div>

<th:block th:replace="~{fragments :: footer}"></th:block>
</body>
</html>
