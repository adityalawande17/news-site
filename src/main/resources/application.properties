# ============================
# Server
# ============================
server.port=8080

# ============================
# Database - H2 (file-based, persists between restarts)
# To switch to MySQL: comment out H2 block, uncomment MySQL block below
# ============================
spring.datasource.url=jdbc:h2:file:./data/magazinedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL alternative (uncomment to use) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/magazinedb?createDatabaseIfNotExist=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================
# File upload
# ============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=src/main/resources/static/uploads

# ============================
# Thymeleaf
# ============================
spring.thymeleaf.cache=false
